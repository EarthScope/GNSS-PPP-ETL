# Format Specification — structured for dev_parameter_spec.py dataclasses
#
# Hierarchy:
#   FormatSpecCatalog.formats
#     └─ FormatSpecVersionCatalog  (name + versions)
#         └─ FormatSpecVariantCatalog  (name + variants)
#             └─ FormatSpec  (name, version, variant, parameters, filename)
#
# Parameters are references to the global ParameterCatalog.
# Only parameters used in the filename template are listed.
# Dict entries with just {name: X} inherit everything from the catalog.
# Dict entries with extra keys override those fields on the catalog entry.

formats:

  # ═══════════════════════════════════════════════════════════════════
  # RINEX — Receiver Independent Exchange Format
  # ═══════════════════════════════════════════════════════════════════
  RINEX:
    name: RINEX
    versions:

      # ── Version 2 ────────────────────────────────────────────────
      "2":
        name: "2"
        variants:

          observation:
            name: RINEX
            version: "2"
            variant: observation
            parameters:
              - name: SSSS
                description: 4 char station code
              - name: DDD
                description: day of year (001-366)
              - name: YY
                description: 2 digit year
              - name: T
                description: file type code
            filename: "{SSSS}{DDD}0.{YY}{T}"

          navigation:
            name: RINEX
            version: "2"
            variant: navigation
            parameters:
              - name: SSSS
              - name: DDD
              - name: YY
              - name: T
            filename: "{SSSS}{DDD}0.{YY}{T}"

          meteorological:
            name: RINEX
            version: "2"
            variant: meteorological
            parameters:
              - name: SSSS
              - name: DDD
              - name: YY
            filename: "{SSSS}{DDD}0.{YY}m"

      # ── Version 3 ────────────────────────────────────────────────
      "3":
        name: "3"
        variants:

          observation:
            name: RINEX
            version: "3"
            variant: observation
            parameters:
              - name: SSSS
                description: 4 char station code
              - name: MONUMENT
                description: 1 char monument/marker number
              - name: R
                description: receiver number
              - name: CCC
                description: 3 char data center / agency
              - name: S
                description: data source (R=receiver, S=stream)
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: DDU
                description: file period (01D, 01H, 15M)
              - name: FRU
                description: sampling interval (30S, 01S)
              - name: D
                description: satellite system identifier
            filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{FRU}_{D}O.rnx"

          navigation:
            name: RINEX
            version: "3"
            variant: navigation
            parameters:
              - name: SSSS
              - name: MONUMENT
              - name: R
              - name: CCC
              - name: S
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: DDU
              - name: D
            filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}N.rnx"

          meteorological:
            name: RINEX
            version: "3"
            variant: meteorological
            parameters:
              - name: SSSS
              - name: MONUMENT
              - name: R
              - name: CCC
              - name: S
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: DDU
              - name: D
            filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}M.rnx"

      # ── Version 4 ────────────────────────────────────────────────
      "4":
        name: "4"
        variants:

          observation:
            name: RINEX
            version: "4"
            variant: observation
            parameters:
              - name: SSSS
              - name: MONUMENT
              - name: R
              - name: CCC
              - name: S
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: DDU
              - name: FRU
              - name: D
            filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{FRU}_{D}O.rnx"

          navigation:
            name: RINEX
            version: "4"
            variant: navigation
            parameters:
              - name: SSSS
              - name: MONUMENT
              - name: R
              - name: CCC
              - name: S
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: DDU
              - name: D
            filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}N.rnx"

          meteorological:
            name: RINEX
            version: "4"
            variant: meteorological
            parameters:
              - name: SSSS
              - name: MONUMENT
              - name: R
              - name: CCC
              - name: S
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: DDU
              - name: D
            filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}M.rnx"

  # ═══════════════════════════════════════════════════════════════════
  # PRODUCT — Generic product format (SP3, CLK, ERP, BIA, etc.)
  # ═══════════════════════════════════════════════════════════════════
  PRODUCT:
    name: PRODUCT
    versions:

      "1":
        name: "1"
        variants:

          default:
            name: PRODUCT
            version: "1"
            variant: default
            parameters:
              - name: AAA
                description: analysis center code (e.g., "WUM", "COD")
              - name: V
                description: version/solution identifier
              - name: PPP
                description: campaign/project specification
              - name: TTT
                description: solution type identifier (e.g., "FIN", "RAP", "ULT")
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: LEN
                description: product intended nominal start epoch
              - name: SMP
                description: temporal sampling resolution (e.g., "05M")
              - name: CNT
                description: content type (e.g., "ORB", "CLK", "ERP")
              - name: FMT
                description: format code (e.g., "SP3", "CLK")
            filename: "{AAA}{V}{PPP}{TTT}_{YYYY}{DDD}{HH}{MM}_{LEN}_{SMP}_{CNT}.{FMT}.*"

          station:
            name: PRODUCT
            version: "1"
            variant: station
            parameters:
              - name: AAA
              - name: V
              - name: PPP
              - name: TTT
              - name: YYYY
              - name: DDD
              - name: HH
              - name: MM
              - name: LEN
              - name: SMP
              - name: SSSMRCCC_
                description: optional station identifier
              - name: CNT
              - name: FMT
            filename: "{AAA}{V}{PPP}{TTT}_{YYYY}{DDD}{HH}{MM}_{LEN}_{SMP}_{SSSMRCCC_}_{CNT}.{FMT}.*"

  # ═══════════════════════════════════════════════════════════════════
  # TABLE — Static table data (leap.sec, sat_parameters)
  # ═══════════════════════════════════════════════════════════════════
  TABLE:
    name: TABLE
    versions:

      "1":
        name: "1"
        variants:

          default:
            name: TABLE
            version: "1"
            variant: default
            parameters: []
            filename: ""

  # ═══════════════════════════════════════════════════════════════════
  # VIENNA_MAPPING_FUNCTIONS — VMF tropospheric mapping function grids
  # ═══════════════════════════════════════════════════════════════════
  VIENNA_MAPPING_FUNCTIONS:
    name: VIENNA_MAPPING_FUNCTIONS
    versions:

      "1":
        name: "1"
        variants:

          default:
            name: VIENNA_MAPPING_FUNCTIONS
            version: "1"
            variant: default
            parameters:
              - name: PRODUCT
                description: product identifier (e.g., "VMF1", "VMF3")
              - name: YYYY
              - name: MONTH
              - name: DAY
              - name: VMFHH
                description: hour of day for sub-daily products (H00, H06, H12, H18)
                pattern: "H(?:00|06|12|18)"
            filename: "{PRODUCT}_{YYYY}{MONTH}{DAY}.{VMFHH}"

          orography:
            name: VIENNA_MAPPING_FUNCTIONS
            version: "1"
            variant: orography
            parameters:
              - name: RESOLUTION
                description: grid resolution for VMF products
                pattern: "\\b(2\\.5x2|1x1|5x5)\\b"
            filename: "orography_ell_{RESOLUTION}"

  # ═══════════════════════════════════════════════════════════════════
  # LEO_L1B — LEO satellite Level-1B instrument data (GRACE/GRACE-FO)
  # ═══════════════════════════════════════════════════════════════════
  LEO_L1B:
    name: LEO_L1B
    versions:

      "1":
        name: "1"
        variants:

          default:
            name: LEO_L1B
            version: "1"
            variant: default
            parameters:
              - name: INSTRUMENT
                description: e.g., GNV1B, ACC1B, SCA1B
              - name: YYYY
              - name: MONTH
              - name: DAY
              - name: SPACECRAFT
                pattern: "[CD]"
              - name: RELNUM
                pattern: "\\d+\\..*"
            filename: "{INSTRUMENT}_{YYYY}-{MONTH}-{DAY}_{SPACECRAFT}_{RELNUM}"

  # ═══════════════════════════════════════════════════════════════════
  # ANTENNAE — ATX antenna phase center calibrations
  # ═══════════════════════════════════════════════════════════════════
  ANTENNAE:
    name: ANTENNAE
    versions:

      "1":
        name: "1"
        variants:

          default:
            name: ANTENNAE
            version: "1"
            variant: default
            parameters:
              - name: REFFRAME
                description: full IGS frame name (e.g., "igs20", "igs14")
            filename: "{REFFRAME}.atx"

          archive:
            name: ANTENNAE
            version: "1"
            variant: archive
            parameters:
              - name: REFFRAME
              - name: GPSWEEK
            filename: "{REFFRAME}_{GPSWEEK}.atx"

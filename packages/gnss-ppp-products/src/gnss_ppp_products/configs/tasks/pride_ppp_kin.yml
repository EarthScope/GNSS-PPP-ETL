# PRIDE-PPP Kinematic Processing — Dependency Specification
# =========================================================
#
# Declares product dependencies for kinematic PPP-AR processing
# using the PRIDE-PPP (pdp3) engine.
#
# The preferences list defines the search order.  For each required
# product the resolver walks through preferences top→bottom, checking
# local storage then (optionally) downloading from the remote server.
# The first hit wins.
#
# Preferences that don't apply to a product are silently skipped.
# For example, LEAP_SEC has no solution axis, so the solution field
# in each preference is ignored — only center ordering matters.

name: pride_ppp_kinematic

description: >
  Product dependencies for kinematic PPP-AR processing.
  Prefers Wuhan final products, falls back to IGS, then
  CDDIS, and finally rapid solutions.

# ─── Preference cascade ───────────────────────────────────────────
#
# Tried top→bottom for every dependency.  Each slot specifies a
# center and (optionally) a solution quality and campaign.  Axes that
# a product doesn't have are simply ignored.

preferences:
  - center: WUM
    solution: FIN
    campaign: MGX

  - center: IGS
    solution: FIN
    campaign: OPS

  - center: COD
    solution: FIN
    campaign: OPS

  - center: WUM
    solution: RAP
    campaign: MGX

  - center: IGS
    solution: RAP
    campaign: OPS

  - center: CDDIS
    solution: FIN

  - center: CDDIS
    solution: RAP

# ─── Dependencies ─────────────────────────────────────────────────

dependencies:
  - spec: ORBIT
    required: true
    description: Precise satellite orbits (SP3)

  - spec: CLOCK
    required: true
    description: Precise satellite and receiver clocks (CLK)

  - spec: ERP
    required: true
    description: Earth rotation parameters

  - spec: BIA
    required: true
    description: Observable-specific signal biases

  - spec: ATTOBX
    required: true
    description: Satellite attitude quaternions (ORBEX)

  - spec: RNX3_BRDC
    required: true
    description: Broadcast navigation RINEX 3

  - spec: LEAP_SEC
    required: false
    description: Leap second table (rarely updated)

  - spec: SAT_PARAMS
    required: false
    description: Satellite physical parameters table

id: CDDIS
name: NASA CDDIS
website: https://cddis.nasa.gov/

servers:
  - id: cddis_ftps
    name: CDDIS FTPS
    hostname: "ftps://gdc.cddis.eosdis.nasa.gov"
    protocol: ftps
    auth_required: false
    description: Requires FTPS (explicit TLS). Anonymous login with email address.

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: cddis_orbit
    product_name: ORBIT
    server_id: cddis_ftps
    available: true
    description: Precise orbits (mirrors from all ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: GBM}
      - {name: AAA, value: WUM}
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: 05M}
      - {name: SMP, value: 15M}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: cddis_clock
    product_name: CLOCK
    server_id: cddis_ftps
    available: true
    description: Precise clocks (mirrors from all ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: GBM}
      - {name: AAA, value: WUM}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: 30S}
      - {name: SMP, value: 05M}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Ionosphere ─────────────────────────────────────────────────
  - id: cddis_gim
    product_name: IONEX
    server_id: cddis_ftps
    available: true
    description: Global Ionosphere Maps
    parameters:
      - {name: AAA, value: COD}
      - {name: AAA, value: IGS}
      - {name: AAA, value: JPL}
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 01H}
      - {name: SMP, value: 02H}
    directory: {pattern: "gnss/products/ionex/{YYYY}/{DDD}/"}

  # ── Broadcast navigation ───────────────────────────────────────
  - id: cddis_nav
    product_name: RNX3_BRDC
    server_id: cddis_ftps
    available: true
    description: RINEX 3 broadcast navigation (multi-GNSS)
    parameters:
      - {name: CCC, value: IGS}
      - {name: D, value: E}
      - {name: D, value: M}
    directory: {pattern: "gnss/data/daily/{YYYY}/{DDD}/{YY}p/"}

  # ── Reference tables ───────────────────────────────────────────
  - id: cddis_leap_seconds
    product_name: LEAP_SEC
    server_id: cddis_ftps
    available: true
    description: IERS leap seconds file
    parameters: []
    directory: {pattern: "pub/products/iers"}

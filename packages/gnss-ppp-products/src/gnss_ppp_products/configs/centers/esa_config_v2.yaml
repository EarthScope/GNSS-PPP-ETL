id: ESA
name: ESA/ESOC
website: https://www.esa.int/

servers:
  - id: esa_ftp
    name: ESA GNSS FTP
    hostname: "ftp://gssc.esa.int"
    protocol: ftp
    auth_required: false
    description: ESA GNSS Science Support center

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: esa_orbit
    product_name: ORBIT
    server_id: esa_ftp
    available: true
    description: Precise orbits
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: 05M}
      - {name: SMP, value: 15M}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: esa_clock
    product_name: CLOCK
    server_id: esa_ftp
    available: true
    description: Precise clocks
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 30S}
      - {name: SMP, value: 05M}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Ionosphere ─────────────────────────────────────────────────
  - id: esa_gim
    product_name: IONEX
    server_id: esa_ftp
    available: true
    description: ESA Global Ionosphere Maps
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 01H}
      - {name: SMP, value: 02H}
    directory: {pattern: "gnss/products/ionex/{YYYY}/{DDD}/"}

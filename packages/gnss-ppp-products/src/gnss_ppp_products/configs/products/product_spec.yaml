# campaigns:
#   - DEM # Demonstration campgain for testing and development
#   - MGX # Multi-GNSS Experiment campaign
#   - OPS # Operational campaign for real-time products
#   - R01 # Reprocessing campaign 1
#   - Rnn # Reprocessing campaign n (placeholder for future campaigns)
#   - TGA # TIGA campaign for tide gauge stations
#   - TST # Test campaign for new products or formats

# solutions:
#   - FIN # Final products
#   - RAP # Rapid products with moderate quality and latency
#   - ULT # Ultra-rapid products with lower quality but minimal latency
#   - NRT # Near-real-time products with best effort quality and minimal latency
#   - PRD # Predicted products 
#   - RTS # Real-time streaming products
#   - SNX # SINEX Combination products

# content_types:

#   - ATT # Attitude information
#   - CLK # Receiver and/or satellite clock parameters
#   - CLS # Summary of clock combination
#   - CMP # Comparison summary files
#   - CRD # Station Coordinates/velocities in SINEX
#   - DSC # Epochs of station position/velocity discontinuities
#   - ERP # Earth rotation parameters
#   - ORB # Satellite orbits
#   - PSD # Post-seismic deformation models in SINEX
#   - RES # Residuals from daily SINEX combination
#   - SOL # Variance/covariance information or normal equations in SINEX
#   - SUM # Summary of orbit or SINEX combination
#   - TRO # Troposphere ZPD product
#   # The following content types are distinguished for bias products:
#   - DCB # Differential code biases
#   - DPB # Differential phase biases
#   - DSB # Differential signal biases (code and phase)
#   - OCB # Observable-specific code biases
#   - OPB # Observable-specific phase biases
#   - OSB # Observable-specific signal biases (code and phase)
#   # The following content types are distinguished for ionosphere products:
#   - GIM # Global Ionosphere (TEC) Maps (GIMs)
#   - ROT # Rate of TEC Index Maps (ROTI Maps)

# format_types:
#   - BIA # bias SINEX, Schaer (2018)
#   - CLK # clock RINEX, Ray and Gurtner (2012)
#   - ERP # IGS ERP format, Kouba and Mirault (1998)
#   - INX # IONEX ionospheric TEC grid product format, Schaer et al. (1998)
#   - JSON # JavaScript Object Notation, lightweight data-interchange format

#   - OBX # ORBEX satellite orbit/attitude format, Loyer (2019)
#   - SNX # Solution INdependent EXchange (SINEX) format, Rothacher and Thaller (2006)
#   - SP3 # Standard Product 3 (SP3) orbit format, Hilla (2016)
#   - SUM # Summary of the indicated product, combination summary, etc
#   - TRO # SINEX_TRO product format, Pacione and Dousa (2019)
#   - YAML # YAML Ain’t Markup Language, human-friendly data serialization
# # Default regex patterns for metadata metadata.  Products can override
# # individual metadata; any field NOT overridden resolves to the pattern
# # listed here when building a filename regex.

name: default

formats:

  RINEX:
    description: Receiver Independent Exchange Format used for GNSS observation, navigation, and meteorological data.

    versions:

      "2":
        description: >
          Legacy format primarily used for GPS and GLONASS.
          Station names are 4 characters. File naming is short
          and strongly tied to day-of-year.

        metadata:
          SSSS:
            description: 4 char station code
          DDD:
            description: day of year (001-366)
          YY:
            description: 2 digit year
          T:
            description: file type code

        file_templates:

          observation:
            - "{SSSS}{DDD}0.{YY}{T}"
         

          navigation:
            - "{SSSS}{DDD}0.{YY}{T}"

          meteorological:
            - "{SSSS}{DDD}0.{YY}m"

        compression:
          - ".Z"
          - ".gz"

      "3":
        notes: >
          Modern multi-GNSS format supporting GPS, GLONASS,
          Galileo, BeiDou, QZSS, SBAS. Introduces long filenames
          with extensive metadata encoding.

        metadata:
          SSSS:
            description: 4 char station code
          MONUMENT:
            description: 1 char monument/marker number
          R:
            description: receiver number
          CCC:
            description: 3 char data center / agency
          S:
            description: data source (R=receiver, S=stream)
          YYYY:
            description: 4 digit year
          DDD:
            description: day of year
          HH:
            description: hour
          MM:
            description: minute
          DDU:
            description: file period (01D, 01H, 15M)
          FRU:
            description: sampling interval (30S, 01S)
          D:
            description: satellite system identifier
          T:
            description: file type

        file_templates:

          observation:
            - "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{FRU}_{D}O.rnx"

          navigation:
            - "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}N.rnx"

          meteorological:
            - "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}M.rnx"

        compression:
          - ".gz"
          - ".crx.gz"

      "4":
        notes: >
          Latest RINEX standard emphasizing improved navigation
          message support and modern GNSS signals.

        metadata:
          SSSS:
          MONUMENT:
          R:
          CCC:
          S:
          YYYY:
          DDD:
          HH:
          MM:
          DDU:
          FRU:
          D:
          T:

        file_templates:

          observation:
            - "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{FRU}_{D}O.rnx"

          navigation:
            - "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}N.rnx"

          meteorological:
            - "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}M.rnx"

        compression:
          - ".gz"
          - ".crx.gz"

  PRODUCT:
    description: >
      Generic product format for various GNSS data types (SP3, CLK, ERP, etc.)
      with flexible metadata and filename file_templates.
    versions: 
      "1":
      
        metadata:
          AAA:
            description: analysis center code (e.g., "WUM", "COD")
          V:
            description: version/solution identifier
          PPP:
            description: campaign/project specification
          TTT:
            description: solution type identifier (e.g., "FIN", "RAP", "ULT")
          YYYY:
            description: 4 digit year
          DDD:
            description: day of year
          HH:
            description: hour (for sub-daily products)
          MM:
            description: minute (for sub-daily products)
          LEN:
            description: product intended nominal start epoch
          SMP:
            description: temporal sampling resolution (e.g., "05M" for 5 minutes)
          CNT:
            description: content type (e.g., "ORB", "CLK", "ERP")
          SSSMRCCC_:
            description: optional station identifier
          FMT:
            description: format code for products with multiple formats (e.g., "SP3", "CLK")

        file_templates:
          default:
            - "{AAA}{V}{PPP}{TTT}_{YYYY}{DDD}{HH}{MM}_{LEN}_{SMP}_{CNT}.{FMT}.*"
          station:
            - "{AAA}{V}{PPP}{TTT}_{YYYY}{DDD}{HH}{MM}_{LEN}_{SMP}_{SSSMRCCC}_{CNT}.{FMT}.*"
    compression:
      - ".gz"
      - ".zip"

  TABLE:
    description: >
      Table data (i.e. leap.sec or sat_parameters)
    versions:
      "1":
        file_templates:
          default:
            - ""
  VIENNA_MAPPING_FUNCTIONS:
    description: >
      Vienna Mapping Functions (VMF) providing tropospheric mapping function grids.

    versions:
      "1":
        metadata:
          PRODUCT:
            description: product identifier (e.g., "VMF1", "VMF3")
          RESOLUTION:
            pattern: \b(2\.5x2|1x1|5x5)\b
            description: grid resolution for VMF products (e.g., "2.5x2", "1x1", "5x5")
          VMFHH:
            pattern: H(?:00|06|12|18)
            description: hour of day for sub-daily products (H00, H06, H12, H18)
          YYYY:
            description: 4 digit year
          MONTH:
            description: 2 digit month
          DAY:
            description: 2 digit day

        file_templates:
          default:
            - "{PRODUCT}_{YYYY}{MONTH}{DAY}.{VMFHH}"
          orography:
            - "orography_ell_{RESOLUTION}"

  LEO_L1B:
    description: >
      LEO satellite Level-1B instrument data format used for
      GRACE and GRACE-FO missions hosted at GFZ ISDC.
    versions:
      "1":
        metadata:
          INSTRUMENT:
            description: e.g., GNV1B, ACC1B, SCA1B
          YYYY:
          MONTH:
          DAY:
          SPACECRAFT:
            default: "[CD]"
          RELNUM:
            default: "\\d+\\..*"
        file_templates:
          default:
            - "{INSTRUMENT}_{YYYY}-{MONTH}-{DAY}_{SPACECRAFT}_{RELNUM}"

  ANTENNAE:
    description: >
      Antenna information in ATX format, including phase center variations and offsets.
      Filenames use the IGS reference frame name (e.g. igs20) — there is no
      separate analysis-center prefix.  Archive files carry a GPS-week
      suffix; the query should match any week and select the most recent
      file whose week is <= the target date.
    versions:
      "1":
        metadata:
          REFFRAME:
            description: full IGS frame name (e.g., "igs20", "igs14")
          GPSWEEK:
          
        file_templates:
          archive:
            - "{REFFRAME}_{GPSWEEK}.atx"
          default:
            - "{REFFRAME}.atx"

products:

  RINEX_OBS:
    description: GNSS observation measurements recorded by receivers.

    formats:

      - format: RINEX
        version: "2"
        constraints:
          T: \b[dot]\b
        variant: observation


      - format: RINEX
        version: "3"
        constraints:
          T: \b[ONM]\b
          D: \b[GRECEJSM]\b
        variant: observation

      - format: RINEX
        version: "4"
        constraints:
          T: \b[ONM]\b
          D: \b[GRECEJSM]\b
        variant: observation

  RINEX_NAV:
    description: Broadcast satellite ephemerides and clock parameters.

    formats:

      - format: RINEX
        version: "2"
        constraints:
          T: \b[ngh]\b
        variant: navigation

      - format: RINEX
        version: "3"
        constraints:
          T: \b[ON]\b
          D: \b[GRECEJSM]\b
        variant: navigation

      - format: RINEX
        version: "4"
        constraints:
          T: \b[ON]\b
          D: \b[GRECEJSM]\b
        variant: navigation

  RINEX_MET:
    description: Meteorological data associated with GNSS stations.

    formats:

      - format: RINEX
        version: "2"
        constraints:
          T: m
        variant: meteorological

      - format: RINEX
        version: "3"
        constraints:
          T: M
          D: \b[GRECEJSM]\b
        variant: meteorological

      - format: RINEX
        version: "4"
        constraints:
          T: M
          D: \b[GRECEJSM]\b
        variant: meteorological
  
  ORBIT:
    description: >
      Satellite orbit products providing precise ephemerides. ex: WMC0DEMFIN_20252270000_01D_05M_ORB.SP3

    formats:

      - format: PRODUCT
        version: "1"
        constraints:
          LEN: "01D"
          CNT: "ORB"
          FMT: "SP3"
        variant: default

  CLOCK:
    description: >
      Satellite and/or receiver clock products providing precise clock parameters. ex: SHA0MGXRAP_20182700000_01D_05M_CLK.CLK.gz

    formats:

      - format: PRODUCT
        version: "1"
        constraints:
          FMT: "CLK"
          LEN: "01D"
          CNT: "CLK"
        variant: default

  ERP:
    description: >
      Earth rotation parameter (ERP) products.

    formats:

      - format: PRODUCT
        version: "1"
        constraints:
          FMT: "ERP"
          LEN: "01D"
          CNT: "ERP"
          SMP: "01D"
        variant: default
  
  BIA:
    description: >
      Bias products providing differential code and/or phase biases.
      ex: WMC0DEMFIN_20252240000_01D_01D_OSB.BIA

    formats:

      - format: PRODUCT
        version: "1"
        constraints:
          FMT: "BIA"
          LEN: "01D"
          CNT: "OSB"
        variant: default
  
  ATTOBX:
    description: >
      ORBEX format products providing satellite orbit and/or attitude information.
      ex: WMC0DEMFIN_20252240000_01D_30S_ATT.OBX

    formats:

      - format: PRODUCT
        version: "1"
        constraints:
          FMT: "OBX"
          LEN: "01D"
          CNT: "ATT"
          SMP: "30S"
        variant: default

  IONEX:
    description: >
      IONEX format products providing global ionospheric TEC maps and related products.

    formats:

      - format: PRODUCT
        version: "1"
        constraints:
          FMT: "INX"
          LEN: "01D"
          CNT: "GIM"
        variant: default

  RNX3_BRDC:
    description: >
      RINEX 3 navigation files containing broadcast ephemerides and clock parameters.
      ex: BRDC00IGN_R_20252530000_01D_EN.rnx.gz

    formats:

      - format: RINEX
        version: "3"
        constraints:
          SSSS: "BRDC"
          DDU: "01D"
          S: "R"
        variant: navigation
  
  LEAP_SEC:
    description: >
      Leap second table providing scheduled and historical leap second information.

    formats:

      - format: TABLE
        version: "1"
        file_templates:
          - "leap.sec"
  SAT_PARAMS:
    description: >
      Satellite parameters table providing metadata about GNSS satellites (e.g., antenna types, signal frequencies).

    formats:

      - format: TABLE
        version: "1"
        file_templates:
          - "sat_parameters"
  VMF:
    description: >
      Vienna Mapping Functions (VMF) providing tropospheric mapping function grids.

    formats:

      - format: VIENNA_MAPPING_FUNCTIONS
        version: "1"
        variant: default
  
  OROGRAPHY:
    description: >
      Ellipsoidal terrain height grid (5x5) for VMF interpolation

    formats:

      - format: VIENNA_MAPPING_FUNCTIONS
        version: "1"
        constraints:
          RESOLUTION: "5x5"
        variant: orography

  LEO_L1B:
    description: >
      LEO satellite Level-1B instrument data (GRACE, GRACE-FO).

    formats:

      - format: LEO_L1B
        version: "1"
        variant: default

  ATTATX:
    description: >
      ATX format products providing antenna information, including phase center variations and offsets.

    formats:

      - format: ANTENNAE
        version: "1"
        variant: default

      - format: ANTENNAE
        version: "1"
        variant: archive
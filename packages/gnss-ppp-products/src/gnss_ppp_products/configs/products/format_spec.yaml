PRODUCT:
  name: PRODUCT
  versions:
    "1":
      name: "1"
      variants:
        default:
          name: PRODUCT
          version: "1"
          variant: default
          parameters:
            - name: AAA
            - name: V
            - name: PPP
            - name: TTT
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: LEN
            - name: SMP
            - name: CNT
            - name: FMT
          filename: "{AAA}{V}{PPP}{TTT}_{YYYY}{DDD}{HH}{MM}_{LEN}_{SMP}_{CNT}.{FMT}.*"
        station:
          name: PRODUCT
          version: "1"
          variant: station
          parameters:
            - name: AAA
            - name: V
            - name: PPP
            - name: TTT
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: LEN
            - name: SMP
            - name: SSSMRCCC_
            - name: CNT
            - name: FMT
          filename: "{AAA}{V}{PPP}{TTT}_{YYYY}{DDD}{HH}{MM}_{LEN}_{SMP}_{SSSMRCCC_}_{CNT}.{FMT}.*"

TABLE:
  name: TABLE
  versions:
    "1":
      name: "1"
      variants:
        default:
          name: TABLE
          version: "1"
          variant: default
          parameters: []
          filename: ""

VIENNA_MAPPING_FUNCTIONS:
  name: VIENNA_MAPPING_FUNCTIONS
  versions:
    "1":
      name: "1"
      variants:
        default:
          name: VIENNA_MAPPING_FUNCTIONS
          version: "1"
          variant: default
          parameters:
            - name: PRODUCT
            - name: YYYY
            - name: MONTH
            - name: DAY
            - name: VMFHH
              pattern: "H(?:00|06|12|18)"
          filename: "{PRODUCT}_{YYYY}{MONTH}{DAY}.{VMFHH}"
        orography:
          name: VIENNA_MAPPING_FUNCTIONS
          version: "1"
          variant: orography
          parameters:
            - name: RESOLUTION
              pattern: "\\b(2\\.5x2|1x1|5x5)\\b"
          filename: "orography_ell_{RESOLUTION}"

LEO_L1B:
  name: LEO_L1B
  versions:
    "1":
      name: "1"
      variants:
        default:
          name: LEO_L1B
          version: "1"
          variant: default
          parameters:
            - name: INSTRUMENT
            - name: YYYY
            - name: MONTH
            - name: DAY
            - name: SPACECRAFT
              pattern: "[CD]"
            - name: RELNUM
              pattern: "\\d+\\..*"
          filename: "{INSTRUMENT}_{YYYY}-{MONTH}-{DAY}_{SPACECRAFT}_{RELNUM}"

ANTENNAE:
  name: ANTENNAE
  versions:
    "1":
      name: "1"
      variants:
        default:
          name: ANTENNAE
          version: "1"
          variant: default
          parameters:
            - name: REFFRAME
          filename: "{REFFRAME}.atx"
        archive:
          name: ANTENNAE
          version: "1"
          variant: archive
          parameters:
            - name: REFFRAME
            - name: GPSWEEK
          filename: "{REFFRAME}_{GPSWEEK}.atx"


            - name: MONUMENT
            - name: R
            - name: CCC
            - name: S
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: DDU
            - name: D
          filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}N.rnx"
        meteorological:
          name: RINEX
          version: "3"
          variant: meteorological
          parameters:
            - name: SSSS
            - name: MONUMENT
            - name: R
            - name: CCC
            - name: S
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: DDU
            - name: D
          filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}M.rnx"
    "4":

RINEX:
  name: RINEX
  versions:
    "2":
      name: "2"
      variants:
        observation:
          name: RINEX
          version: "2"
          variant: observation
          parameters:
            - name: SSSS
              description: 4 char station code
            - name: DDD
              description: day of year (001-366)
            - name: YY
              description: 2 digit year
            - name: T
              description: file type code
          filename: "{SSSS}{DDD}0.{YY}{T}"
        navigation:
          name: RINEX
          version: "2"
          variant: navigation
          parameters:
            - name: SSSS
            - name: DDD
            - name: YY
            - name: T
          filename: "{SSSS}{DDD}0.{YY}{T}"
        meteorological:
          name: RINEX
          version: "2"
          variant: meteorological
          parameters:
            - name: SSSS
            - name: DDD
            - name: YY
          filename: "{SSSS}{DDD}0.{YY}m"
    "3":
      name: "3"
      variants:
        observation:
          name: RINEX
          version: "3"
          variant: observation
          parameters:
            - name: SSSS
            - name: MONUMENT
            - name: R
            - name: CCC
            - name: S
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: DDU
            - name: FRU
            - name: D
          filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{FRU}_{D}O.rnx"
        navigation:
          name: RINEX
          version: "3"
          variant: navigation
          parameters:

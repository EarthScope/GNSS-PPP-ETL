            - name: MONUMENT
            - name: R
            - name: CCC
            - name: S
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: DDU
            - name: FRU
            - name: D
          filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{FRU}_{D}O.rnx"
        navigation:
          name: RINEX
          version: "4"
          variant: navigation
          parameters:
            - name: SSSS
            - name: MONUMENT
            - name: R
            - name: CCC
            - name: S
            - name: YYYY
            - name: DDD
            - name: HH
            - name: MM
            - name: DDU
            - name: D
          filename: "{SSSS}{MONUMENT}{R}{CCC}_{S}_{YYYY}{DDD}{HH}{MM}_{DDU}_{D}N.rnx"
        meteorological:
          name: RINEX
          version: "4"

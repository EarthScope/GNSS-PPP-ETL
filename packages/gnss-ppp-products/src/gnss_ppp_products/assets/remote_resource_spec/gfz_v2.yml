id: GFZ
name: GFZ Potsdam
description: >
  German Research Centre for Geosciences in Potsdam. Major IGS analysis
  center producing GPS (GFZ) and MGEX (GBM) products.
website: https://www.gfz-potsdam.de/

servers:
  - id: gfz_ftp
    name: ISDC FTP
    hostname: ftp://isdcftp.gfz-potsdam.de
    protocol: ftp
    auth_required: false
    notes: Information System and Data Center (ISDC) FTP

products:
  - id: gfz_orbit
    spec: ORBIT
    server_id: gfz_ftp
    available: true
    description: Precise orbits
    metadata:
      AAA:
        - GFZ
        - GBM
      TTT:
        - FIN
        - RAP
      PPP:
        - OPS
        - MGX
      SMP:
        - "05M"
        - "15M"
    directory: gnss/products/final/w{GPSWEEK}/

  - id: gfz_clock
    spec: CLOCK
    server_id: gfz_ftp
    available: true
    description: Precise clocks
    metadata:
      AAA:
        - GFZ
        - GBM
      TTT:
        - FIN
        - RAP
      PPP:
        - OPS
        - MGX
      SMP:
        - "30S"
        - "05M"
    directory: gnss/products/final/w{GPSWEEK}/

  - id: gfz_grace_fo_l1b
    spec: LEO_L1B
    server_id: gfz_ftp
    available: true
    description: GRACE-FO Level-1B instrument data
    metadata:
      INSTRUMENT:
        - GNV1B
        - ACC1B
        - SCA1B
        - KBR1B
        - LRI1B
    directory: grace-fo/Level-1B/JPL/{INSTRUMENT}/RL04/{YYYY}/

  - id: gfz_grace_l1b
    spec: LEO_L1B
    server_id: gfz_ftp
    available: true
    description: GRACE Level-1B instrument data
    metadata:
      INSTRUMENT:
        - GNV1B
        - ACC1B
        - SCA1B
        - KBR1B
    directory: grace/Level-1B/JPL/{INSTRUMENT}/RL02/{YYYY}/

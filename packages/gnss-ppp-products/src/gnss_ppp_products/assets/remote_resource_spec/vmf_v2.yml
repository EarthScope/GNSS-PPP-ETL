id: VMF
name: TU Wien (Vienna)
description: >
  Vienna University of Technology provides Vienna Mapping Functions
  (VMF) for tropospheric delay modeling. Also serves orography grids
  for VMF interpolation.
website: https://vmf.geo.tuwien.ac.at/

servers:
  - id: vmf_https
    name: VMF HTTPS
    hostname: https://vmf.geo.tuwien.ac.at
    protocol: https
    auth_required: false
    notes: Primary HTTP server for VMF products

products:
  - id: vmf_vmf1
    spec: VMF
    server_id: vmf_https
    available: true
    description: Vienna Mapping Functions version 1 (2.5x2 grid)
    metadata:
      PRODUCT:
        - VMF1
      RESOLUTION:
        - "2.5x2"
      VMFHH:
        - H00
        - H06
        - H12
        - H18
    directory: trop_products/GRID/2.5x2/VMF1/VMF1_OP/{YYYY}/

  - id: vmf_vmf3_1x1
    spec: VMF
    server_id: vmf_https
    available: true
    description: Vienna Mapping Functions version 3 (1x1 grid, recommended)
    metadata:
      PRODUCT:
        - VMF3
      RESOLUTION:
        - "1x1"
      VMFHH:
        - H00
        - H06
        - H12
        - H18
    directory: trop_products/GRID/1x1/VMF3/VMF3_OP/{YYYY}/

  - id: vmf_vmf3_5x5
    spec: VMF
    server_id: vmf_https
    available: true
    description: Vienna Mapping Functions version 3 (5x5 grid)
    metadata:
      PRODUCT:
        - VMF3
      RESOLUTION:
        - "5x5"
      VMFHH:
        - H00
        - H06
        - H12
        - H18
    directory: trop_products/GRID/5x5/VMF3/VMF3_OP/{YYYY}/

  - id: vmf_orography_1x1
    spec: OROGRAPHY
    server_id: vmf_https
    available: true
    description: Ellipsoidal terrain height grid (1x1) for VMF interpolation
    metadata:
      RESOLUTION:
        - "1x1"
    directory: station_coord_files

  - id: vmf_orography_5x5
    spec: OROGRAPHY
    server_id: vmf_https
    available: true
    description: Ellipsoidal terrain height grid (5x5) for VMF interpolation
    metadata:
      RESOLUTION:
        - "5x5"
    directory: station_coord_files

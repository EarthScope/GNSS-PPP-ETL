# ESA / ESOC
# ==========
#
# European Space Agency's European Space Operations center.
# Produces GPS and Galileo products.


code: ESA
name: ESA/ESOC
description: >
  European Space Agency's European Space Operations center in Darmstadt.
  Produces GPS products and is primary producer for Galileo.
website: https://www.esa.int/

servers:
  - id: esa_ftp
    name: ESA GNSS FTP
    hostname: ftp://gssc.esa.int
    protocol: ftp
    auth_required: false
    notes: ESA GNSS Science Support center

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: esa_sp3
    format: SP3
    content: ORB
    server_id: esa_ftp
    available: true
    description: Precise orbits
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: ESA
        description: GPS operational
      - campaign: MGX
        center: ESA
        description: Multi-GNSS
    sampling_set:
      - interval: "05M"
      - interval: "15M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ORB.SP3.*"

  - id: esa_clk
    format: CLK
    content: CLK
    server_id: esa_ftp
    available: true
    description: Precise clocks
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: ESA
    sampling_set:
      - interval: "30S"
      - interval: "05M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_CLK.CLK.*"

  - id: esa_gim
    format: INX
    content: GIM
    server_id: esa_ftp
    available: true
    description: ESA Global Ionosphere Maps
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: ESA
    sampling_set:
      - interval: "01H"
      - interval: "02H"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/ionex/{year}/{doy}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_GIM.INX.*"

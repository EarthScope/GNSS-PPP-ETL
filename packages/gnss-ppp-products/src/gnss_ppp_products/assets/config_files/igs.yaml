# IGS Combined Solutions (via IGN France)
# ========================================
#
# International GNSS Service combined products, hosted by IGN France.
# Combined solutions are weighted combinations of multiple analysis centers.


code: IGS
name: IGS (via IGN France)
description: >
  International GNSS Service combined solutions hosted by Institut 
  National de l'Information Géographique et Forestière (IGN France).
  Combined products provide the official IGS reference solutions.
website: https://igs.org/

servers:
  - id: ign_ftp
    name: IGN France FTP
    hostname: ftp://igs.ign.fr
    protocol: ftp
    auth_required: false
    notes: IGN France FTP mirror

  - id: igs_http
    name: IGS HTTP
    hostname: https://files.igs.org
    protocol: https
    auth_required: false
    notes: IGS HTTP server for ANTEX and station data

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: igs_sp3
    format: SP3
    content: ORB
    server_id: ign_ftp
    available: true
    description: IGS combined precise orbits
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "05M"
      - interval: "15M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ORB.SP3.*"

  - id: igs_clk
    format: CLK
    content: CLK
    server_id: ign_ftp
    available: true
    description: IGS combined precise clocks
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
      - interval: "05M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_CLK.CLK.*"

  - id: igs_erp
    format: ERP
    content: ERP
    server_id: ign_ftp
    available: true
    description: IGS combined Earth rotation parameters
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ERP.ERP.*"
    

  - id: igs_bias
    format: BIA
    content: OSB
    server_id: ign_ftp
    available: true
    description: IGS combined biases
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_OSB.BIA.*"

  - id: igs_obx
    format: OBX
    content: ATT
    server_id: ign_ftp
    available: true
    description: IGS satellite attitude (ORBEX)
    quality_set:
      - quality: FIN
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ATT.OBX.*"

  # NOTE: igs_atx commented out — ATX files do not follow the IGS long-form
  # filename convention and cannot be represented in the current ProductConfig schema.

antennae:
  - id: igs_atx
    format: ATX
    content: ATT
    server_id: igs_http
    available: true
    campaign_set:
      - campaign: STATIC
        center: IGS
    description: IGS ANTEX antenna calibrations
    directory: pub/station/general/
    filename: "{center}{reference_frame}_?{gps_week}?.atx.*"
    notes: >
      ANTEX files are not date-specific but frame-specific (igs14, igs20).
      Archive contains weekly snapshots; current file is latest.

  - id: igs_atx_archive
    format: ATX
    content: ATT
    server_id: igs_http
    available: true
    campaign_set:
      - campaign: STATIC
        center: IGS
    description: IGS ANTEX antenna calibrations archive
    directory: pub/station/general/pcv_archive/
    filename: "{center}{reference_frame}_{gps_week}.atx.*"
    notes: >
      ANTEX files are not date-specific but frame-specific (igs14, igs20).
      Archive contains weekly snapshots; current file is latest.
      
rinex:

  - id: igs_nav
    content: N
    server_id: ign_ftp
    available: true
    description: IGS merged broadcast navigation (RINEX 3)
    station_set:
      - station: BRDC
        description: Broadcast navigation (no station code)
    monument_set:
      - monument: 0
        description: No monument code for broadcast navigation
    receiver_set:
      - receiver: "0"
        description: No receiver code for broadcast navigation
    region_set:
      - region: IGS
        description: IGS region code
    data_source: R
    sampling_set:
      - interval: "01D"
    duration_set:
      - duration: "01D"
    satellite_system_set:
      - satellite_system: M
        description: Mixed RINEX 3 navigation file
    directory: pub/igs/data/{year}/{doy}/
    filename: "{station}{monument}{receiver}{region}_{data_source}_{year}{doy}0000_{duration}_{satellite_system}{content}.rnx.*"

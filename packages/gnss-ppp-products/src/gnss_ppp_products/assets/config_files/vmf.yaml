# Vienna Mapping Functions (TU Wien)
# ===================================
#
# Troposphere products from TU Wien (Vienna University of Technology).
# Primary source for VMF1/VMF3 tropospheric mapping functions and delays.


code: VMF
name: TU Wien (Vienna)
description: >
  Vienna University of Technology provides Vienna Mapping Functions
  (VMF) for tropospheric delay modeling. VMF products include hydrostatic
  and wet mapping coefficients and zenith delay values.
website: https://vmf.geo.tuwien.ac.at/

servers:
  - id: vmf_https
    name: VMF HTTPS
    hostname: https://vmf.geo.tuwien.ac.at
    protocol: https
    auth_required: false
    notes: Primary HTTP server for VMF products

defaults:
  compressed: false  # VMF files are typically uncompressed

products: []

troposphere:
  - id: vmf_vmf1
    server_id: vmf_https
    available: true
    description: Vienna Mapping Functions version 1 (2.5x2 grid)
    product_set:
      - product: VMF1
    resolution_set:
      - resolution: "2.5x2"
    hour_set:
      - hour: H00
      - hour: H06
      - hour: H12
      - hour: H18
    directory: "trop_products/GRID/{resolution}/VMF1/VMF1_OP/{year}/"
    filename: "{product}_{year}{month}{day}.{hh}"

  - id: vmf_vmf3_1x1
    server_id: vmf_https
    available: true
    description: Vienna Mapping Functions version 3 (1x1 grid, recommended)
    product_set:
      - product: VMF3
    resolution_set:
      - resolution: "1x1"
    hour_set:
      - hour: H00
      - hour: H06
      - hour: H12
      - hour: H18
    directory: "trop_products/GRID/{resolution}/VMF3/VMF3_OP/{year}/"
    filename: "{product}_{year}{month}{day}.{hh}"

  - id: vmf_vmf3_5x5
    server_id: vmf_https
    available: true
    description: Vienna Mapping Functions version 3 (5x5 grid)
    product_set:
      - product: VMF3
    resolution_set:
      - resolution: "5x5"
    hour_set:
      - hour: H00
      - hour: H06
      - hour: H12
      - hour: H18
    directory: "trop_products/GRID/{resolution}/VMF3/VMF3_OP/{year}/"
    filename: "{product}_{year}{month}{day}.{hh}"

orography:
  - id: vmf_orography_1x1
    server_id: vmf_https
    available: true
    description: Ellipsoidal terrain height grid (1x1) for VMF interpolation
    resolution_set:
      - resolution: "1x1"
    directory: "station_coord_files"
    filename: "orography_ell_{resolution}"

  - id: vmf_orography_5x5
    server_id: vmf_https
    available: true
    description: Ellipsoidal terrain height grid (5x5) for VMF interpolation
    resolution_set:
      - resolution: "5x5"
    directory: "station_coord_files"
    filename: "orography_ell_{resolution}"

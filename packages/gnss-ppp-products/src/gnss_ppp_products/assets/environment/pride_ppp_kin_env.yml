# ============================================================
# Environment Manifest: PRIDE-PPP Kinematic Processing
# ============================================================
#
# Loads all spec registries needed for PRIDE-PPP kinematic
# positioning.  Relative filenames are resolved against the
# default asset sub-directories.
#
# Usage (Python):
#   from gnss_ppp_products.assets.environment import Environment
#   env = Environment.from_yaml("pride_ppp_kin_env.yml")
#   env.validate_or_raise()
#   result = env.resolve(datetime.date(2025, 1, 1), download=True)

name: pride_ppp_kinematic

base_dir: ~/gnss_products

specs:
  # ---- field definitions (axes, regex patterns) ----
  meta: meta_spec.yaml

  # ---- product filename templates & constraints ----
  products: product_spec.yaml

  # ---- query profiles (axis defaults, local collections) ----
  query: query_v2.yaml

  # ---- local storage layout ----
  local: local_v2.yml

  # ---- remote data centers (one entry per center) ----
  centers:
    - cddis_v2.yml
    - igs_v2.yml
    - wuhan_v2.yml
    - code_v2.yml
    - esa_v2.yml
    - gfz_v2.yml
    - vmf_v2.yml

  # ---- task dependency declaration ----
  dependencies: pride_ppp_kin.yml

defaults:
  solution: FIN
  campaign: MGX

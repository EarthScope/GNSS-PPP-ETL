# Example Query Specification Schema
# ====================================
#
# Loaded by: QuerySpec.from_yaml(path)
#
# Defines the user-facing search axes for unified product queries.
# A "query" is a set of axis values that progressively narrows the
# product space.  Omitting an axis = "match any value".
#
# Resolution order (most general → most specific):
#   date → spec → center → campaign → solution → sampling

# ─── Axis definitions ─────────────────────────────────────────────
# Each axis maps to one or more metadata fields in filename templates.

axes:
  date:
    description: Target epoch for the product
    type: computed
    required: true
    maps_to: [YYYY, DDD, HH, MM]
    notes: >
      Resolves to YYYY/DDD/HH/MM plus GPSWEEK, REFFRAME, etc.
      Static products ignore this axis.

  spec:
    description: Product specification name
    type: enum
    required: true
    values:
      - ORBIT
      - CLOCK
      - ERP
      - BIA
      - ATTOBX
      - IONEX
      - ATTATX
      - LEAP_SEC

  center:
    description: Data center / provider
    type: enum
    maps_to: []
    values_from: RemoteResourceRegistry
    notes: Values populated dynamically from loaded center specs.

  campaign:
    description: Processing campaign
    type: enum
    maps_to: [PPP]
    values: [OPS, MGX, R01]
    sort_preference: [OPS, MGX]

  solution:
    description: Product quality tier
    type: enum
    maps_to: [TTT]
    values: [FIN, RAP, ULT, NRT]
    sort_preference: [FIN, RAP, ULT, NRT]

  sampling:
    description: Temporal sampling rate
    type: enum
    maps_to: [SMP]
    values: ["05M", "15M", "30S", "01D", "01H"]

# ─── Product profiles ────────────────────────────────────────────
# Each product declares which axes apply and its storage category.

products:
  ORBIT:
    axes: [date, center, campaign, solution, sampling]
    format_key: PRODUCT
    temporal: daily
    local_collection: products

  CLOCK:
    axes: [date, center, campaign, solution, sampling]
    format_key: PRODUCT
    temporal: daily
    local_collection: products

  ATTATX:
    axes: [center]
    format_key: ANTENNAE
    temporal: static
    local_collection: table

  LEAP_SEC:
    axes: [center]
    format_key: TABLE
    temporal: static
    local_collection: table

  # Product with extra axes beyond the global set
  LEO_L1B:
    axes: [date, center, campaign, solution, sampling]
    extra_axes:
      instrument:
        description: LEO instrument name
        maps_to: [INSTRUMENT]
        values: [GRB, GRC, GRD, JSA, JSB]
    format_key: PRODUCT
    temporal: daily
    local_collection: leo

# Example Metadata Specification Schema
# ======================================
#
# Loaded by: _MetadataRegistry.load_from_yaml(path)
#
# Each top-level key is a metadata field name.  The value is a list
# containing a pattern (regex) and an optional description.
#
# Computed fields (DDD, GPSWEEK, YYYY, REFFRAME, etc.) are registered
# programmatically via utilities.metadata_funcs.register_computed_fields()
# — they do NOT appear in this file.

# Station / receiver identifiers
SSSS:
  - pattern: "[A-Za-z0-9]{4}"
  - description: 4-character station code (e.g. "ALIC", "BRST")

CCC:
  - pattern: "[A-Za-z0-9]{3}"
  - description: 3-character data center or agency code (e.g. "COD", "IGS")

# Time fields
YYYY:
  - pattern: "\\d{4}"
  - description: 4-digit year

DDD:
  - pattern: "\\d{3}"
  - description: 3-digit day of year (001–366)

HH:
  - pattern: "\\d{2}"
  - description: 2-digit hour (00–23)

# Period / sampling
DDU:
  - pattern: "\\d{2}[DHMS]"
  - description: "File period (e.g. 01D, 01H, 15M)"

SMP:
  - pattern: "\\d{2}[DHMS]"
  - description: "Sampling rate (e.g. 05M, 30S)"

# Content / solution
TTT:
  - pattern: "[A-Z]{3}"
  - description: "Solution type (FIN, RAP, ULT)"

PPP:
  - pattern: "[A-Z]{3}"
  - description: "Campaign code (OPS, MGX)"

CNT:
  - pattern: "[A-Z]{3}"
  - description: "Content type (ORB, CLK, ERP)"

FMT:
  - pattern: "[A-Z0-9]{3,4}"
  - description: "Format type (SP3, CLK, BIA)"

# Local Storage Specification
# ===========================
#
# Defines how downloaded GNSS products are organized on disk.
# Product spec names from product_spec.yaml map directly to storage locations.
#
# Layout
# ------
#   <base>/
#   ├── table/                        ← static files (no date dimension)
#   │   ├── leap.sec
#   │   ├── sat_parameters
#   │   ├── igs20.atx
#   │   └── orography_ell_5x5
#   └── {YYYY}/{DDD}/
#       ├── products/                 ← precise products (orbit, clock, bias, …)
#       │   ├── WUM0MGXRAP_20250150000_01D_05M_ORB.SP3.gz
#       │   ├── WUM0MGXRAP_20250150000_01D_30S_CLK.CLK.gz
#       │   └── …
#       └── common/                   ← shared/infrastructure (nav, iono, vmf)
#           ├── BRDC00IGS_R_20250150000_01D_MN.rnx.gz
#           ├── COD0OPSFIN_20250150000_01D_01H_GIM.INX.gz
#           └── …
#
# Template placeholders are resolved by MetaDataRegistry:
#   {YYYY}  – 4-digit year
#   {DDD}   – 3-digit day-of-year (zero-padded)

# -- Temporal categories -----------------------------------------------------
#   daily   – one file per calendar day
#   hourly  – multiple files per day (e.g. 6-hourly VMF grids)
#   static  – updated very infrequently; no date dimension

# -- Storage collections -----------------------------------------------------
name: local_config
description: >
  Local storage configuration for organizing downloaded GNSS products on disk.
  Defines directory structure and naming conventions for products, as well as metadata for each product type.
  
collections:

  # ---------------------------------------------------------------------------
  # Precise products — core PPP inputs
  # ---------------------------------------------------------------------------
  products:
    directory: "{YYYY}/{DDD}/products"
    temporal: daily
    description: "Precise orbit, clock, ERP, bias, and attitude products"
    items:
      - ORBIT
      - CLOCK
      - ERP
      - BIA
      - ATTOBX

  rinex:
    directory: "{YYYY}/{DDD}/rinex"
    temporal: daily
    description: "RINEX observation files for PPP processing"
    items:
      - RNX3_BRDC
      - RINEX_NAV
      - RINEX_MET
      - RINEX_OBS
 
  # ---------------------------------------------------------------------------
  # Common / shared products
  # ---------------------------------------------------------------------------
  common:
    directory: "{YYYY}/{DDD}/common"
    temporal: daily
    description: "Broadcast navigation, ionosphere maps, and troposphere grids"
    items:
      - IONEX
      - VMF

  # ---------------------------------------------------------------------------
  # Static tables and calibrations
  # ---------------------------------------------------------------------------
  table:
    directory: "table"
    temporal: static
    description: "Reference tables, antenna calibrations, and orography grids"
    items:
      - ATTATX
      - LEAP_SEC
      - SAT_PARAMS
      - OROGRAPHY

  # ---------------------------------------------------------------------------
  # Lockfiles — provenance tracking for downloaded products
  # ---------------------------------------------------------------------------
  lockfiles:
    directory: "dependency_lockfiles"
    temporal: daily
    description: "Dependency lockfiles"
    items: []

  # ---------------------------------------------------------------------------
  # LEO satellite instrument data
  # ---------------------------------------------------------------------------
  leo:
    directory: "{YYYY}/{DDD}/leo"
    temporal: daily
    description: "LEO satellite Level-1B instrument data (GRACE, GRACE-FO)"
    items:
      - LEO_L1B
id: CDDIS
name: NASA CDDIS
description: >
  NASA's Crustal Dynamics Data Information System archives and
  distributes space geodesy data including GNSS, SLR, VLBI, and DORIS.
  Mirrors products from all IGS analysis centers.
website: https://cddis.nasa.gov/

servers:
  - id: cddis_ftps
    name: CDDIS FTPS
    hostname: "ftp://gdc.cddis.eosdis.nasa.gov"
    protocol: ftps
    auth_required: false
    description: >
      Requires FTPS (explicit TLS). Anonymous login with email address.
      May require NASA Earthdata login for some products.

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: cddis_orbit
    product_name: ORBIT
    server_id: cddis_ftps
    available: true
    description: Precise orbits (mirrors all IGS ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: GBM}
      - {name: AAA, value: WUM}
      - {name: AAA, value: WMC}
      - {name: AAA, value: COD}
      - {name: AAA, value: GFZ}
      - {name: AAA, value: ESA}
      - {name: AAA, value: JPL}
      - {name: AAA, value: GRG}
      - {name: AAA, value: SHA}
      - {name: AAA, value: CAS}
      - {name: AAA, value: EMR}
      - {name: AAA, value: TUG}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: "05M"}
      - {name: SMP, value: "15M"}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: cddis_clock
    product_name: CLOCK
    server_id: cddis_ftps
    available: true
    description: Precise clocks (mirrors all IGS ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: GBM}
      - {name: AAA, value: WUM}
      - {name: AAA, value: WMC}
      - {name: AAA, value: COD}
      - {name: AAA, value: GFZ}
      - {name: AAA, value: ESA}
      - {name: AAA, value: JPL}
      - {name: AAA, value: GRG}
      - {name: AAA, value: SHA}
      - {name: AAA, value: CAS}
      - {name: AAA, value: EMR}
      - {name: AAA, value: TUG}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: "30S"}
      - {name: SMP, value: "05M"}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── ERP ─────────────────────────────────────────────────────────
  - id: cddis_erp
    product_name: ERP
    server_id: cddis_ftps
    available: true
    description: Earth rotation parameters (mirrors all IGS ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: COD}
      - {name: AAA, value: GFZ}
      - {name: AAA, value: ESA}
      - {name: AAA, value: WUM}
      - {name: AAA, value: GRG}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Biases ──────────────────────────────────────────────────────
  - id: cddis_bia
    product_name: BIA
    server_id: cddis_ftps
    available: true
    description: Observable-specific signal biases (mirrors all IGS ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: COD}
      - {name: AAA, value: GFZ}
      - {name: AAA, value: GBM}
      - {name: AAA, value: ESA}
      - {name: AAA, value: WUM}
      - {name: AAA, value: WMC}
      - {name: AAA, value: GRG}
      - {name: AAA, value: SHA}
      - {name: AAA, value: CAS}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}
  # ── SINEX weekly solutions ──────────────────────────────────────
  - id: cddis_sinex
    product_name: SINEX
    server_id: cddis_ftps
    available: true
    description: Weekly station coordinate SINEX solutions (mirrors all IGS ACs)
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: MIT}
      - {name: AAA, value: EMR}
      - {name: AAA, value: JPL}
      - {name: AAA, value: GFZ}
      - {name: AAA, value: ESA}
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}
  # ── Ionosphere (GIM) ───────────────────────────────────────────
  - id: cddis_gim
    product_name: IONEX
    server_id: cddis_ftps
    available: true
    description: Global Ionosphere Maps
    parameters:
      - {name: AAA, value: COD}
      - {name: AAA, value: IGS}
      - {name: AAA, value: JPL}
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: "01H"}
      - {name: SMP, value: "02H"}
    directory: {pattern: "gnss/products/ionex/{YYYY}/{DDD}/"}

  # ── Broadcast navigation ───────────────────────────────────────
  - id: cddis_nav
    product_name: RNX3_BRDC
    server_id: cddis_ftps
    available: true
    description: RINEX 3 broadcast navigation (multi-GNSS)
    parameters:
      - {name: CCC, value: IGS}
      - {name: D, value: E}
      - {name: D, value: M}
    directory: {pattern: "gnss/data/daily/{YYYY}/{DDD}/{YY}p/"}

  # ── Reference tables ───────────────────────────────────────────
  - id: cddis_leap_seconds
    product_name: LEAP_SEC
    server_id: cddis_ftps
    available: false
    description: >-
      Leap seconds file — not available via CDDIS FTPS (only on HTTPS archive
      which requires NASA Earthdata auth). Use WUM as the primary source.
    parameters: []
    directory: {pattern: "gnss/products/leap_sec/"}

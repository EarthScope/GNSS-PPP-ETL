id: BKG
name: Federal Agency for Cartography and Geodesy (BKG)
description: >
  BKG (Bundesamt für Kartographie und Geodäsie) hosts a full mirror of the
  IGS combined product archive accessible over HTTPS. Serves IGS final, rapid,
  and ultra-rapid orbit/clock/ERP solutions from GPS week 1 to present day,
  and merged RINEX 3 broadcast navigation organized by year/DOY.
  Products use the IGS long filename convention (AAA=IGS, V=0, PPP=OPS).
website: https://igs.bkg.bund.de/

servers:
  - id: bkg_https
    name: BKG IGS HTTPS archive
    hostname: "https://igs.bkg.bund.de"
    protocol: https
    auth_required: false
    description: >
      Full IGS product archive accessible over HTTPS.
      Root path: /root_ftp/IGS/products/{GPSWEEK}/

products:
  # ── Orbits ──────────────────────────────────────────────────────
  # ex: IGS0OPSFIN_20250120000_01D_15M_ORB.SP3.gz
  - id: bkg_orbit
    product_name: ORBIT
    server_id: bkg_https
    available: true
    description: IGS combined precise orbits (FIN ≥13 d, RAP ≤17 h, ULT ≤3 h)
    parameters:
      - {name: AAA, value: IGS}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: TTT, value: ULT}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 05M}
      - {name: SMP, value: 15M}
    directory: {pattern: "root_ftp/IGS/products/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  # ex: IGS0OPSRAP_20250150000_01D_05M_CLK.CLK.gz
  - id: bkg_clock
    product_name: CLOCK
    server_id: bkg_https
    available: true
    description: IGS combined precise clocks (FIN ≥13 d, RAP ≤17 h)
    parameters:
      - {name: AAA, value: IGS}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 30S}
      - {name: SMP, value: 05M}
    directory: {pattern: "root_ftp/IGS/products/{GPSWEEK}/"}

  # ── ERP ─────────────────────────────────────────────────────────
  # ex: IGS0OPSFIN_20250120000_07D_01D_ERP.ERP.gz
  - id: bkg_erp
    product_name: ERP
    server_id: bkg_https
    available: true
    description: IGS combined Earth rotation parameters
    parameters:
      - {name: AAA, value: IGS}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "root_ftp/IGS/products/{GPSWEEK}/"}

  # ── Biases ──────────────────────────────────────────────────────
  # BKG mirrors the IGS combined bias products in the same weekly directory.
  - id: bkg_bias
    product_name: BIA
    server_id: bkg_https
    available: true
    description: IGS combined observable-specific signal biases (BKG mirror)
    parameters:
      - {name: AAA, value: IGS}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "root_ftp/IGS/products/{GPSWEEK}/"}

  # ── Ionosphere (GIM) ───────────────────────────────────────────
  - id: bkg_gim
    product_name: IONEX
    server_id: bkg_https
    available: true
    description: >
      IGS combined Global Ionosphere Maps and contributing AC GIMs mirrored
      by BKG. HTTPS access — no authentication required.
    parameters:
      - {name: AAA, value: IGS}
      - {name: AAA, value: COD}
      - {name: AAA, value: JPL}
      - {name: AAA, value: ESA}
      - {name: AAA, value: CAS}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 01H}
      - {name: SMP, value: 02H}
    directory: {pattern: "root_ftp/IGS/products/ionex/{YYYY}/{DDD}/"}

  # ── SINEX weekly solutions ──────────────────────────────────────
  - id: bkg_sinex
    product_name: SINEX
    server_id: bkg_https
    available: true
    description: IGS combined weekly station coordinate SINEX solutions (BKG mirror)
    parameters:
      - {name: AAA, value: IGS}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
    directory: {pattern: "root_ftp/IGS/products/{GPSWEEK}/"}

  # ── Broadcast navigation ─────────────────────────────────────────
  # ex: BRDC00IGS_R_20250150000_01D_MN.rnx.gz
  - id: bkg_nav
    product_name: RNX3_BRDC
    server_id: bkg_https
    available: true
    description: IGS merged multi-GNSS broadcast navigation (RINEX 3)
    parameters:
      - {name: CCC, value: IGS}
      - {name: D, value: M}
    directory: {pattern: "root_ftp/IGS/BRDC/{YYYY}/{DDD}/"}

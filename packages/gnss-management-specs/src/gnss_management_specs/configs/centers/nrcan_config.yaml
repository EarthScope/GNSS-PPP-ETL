id: NRCan
name: Natural Resources Canada (CSRS)
description: >
  Natural Resources Canada (NRCan) is one of the seven founding IGS analysis
  centers and the originator of the Precise Point Positioning technique.
  Operates the Canadian Spatial Reference System (CSRS) and contributes
  GPS/GNSS precise orbits, clocks, ERP, and signal biases. AC code EMR.
website: https://www.nrcan.gc.ca/home

servers:
  - id: nrcan_ftp
    name: NRCan Geodetic Survey FTP
    hostname: "ftp://ftp.nrcan.gc.ca"
    protocol: ftp
    auth_required: false
    description: >
      NRCan anonymous FTP server.

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: nrcan_orbit
    product_name: ORBIT
    server_id: nrcan_ftp
    available: true
    description: NRCan precise GPS/GNSS orbits
    parameters:
      - {name: AAA, value: EMR}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 05M}
      - {name: SMP, value: 15M}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: nrcan_clock
    product_name: CLOCK
    server_id: nrcan_ftp
    available: true
    description: NRCan precise satellite clocks
    parameters:
      - {name: AAA, value: EMR}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 30S}
      - {name: SMP, value: 05M}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── ERP ─────────────────────────────────────────────────────────
  - id: nrcan_erp
    product_name: ERP
    server_id: nrcan_ftp
    available: true
    description: Earth rotation parameters
    parameters:
      - {name: AAA, value: EMR}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Biases ──────────────────────────────────────────────────────
  - id: nrcan_bias
    product_name: BIA
    server_id: nrcan_ftp
    available: true
    description: Observable-specific signal biases (OSB)
    parameters:
      - {name: AAA, value: EMR}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── SINEX ────────────────────────────────────────────────────────
  - id: nrcan_sinex
    product_name: SINEX
    server_id: nrcan_ftp
    available: true
    description: Weekly station coordinate SINEX solutions
    parameters:
      - {name: AAA, value: EMR}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

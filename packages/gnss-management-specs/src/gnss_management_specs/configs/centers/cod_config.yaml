id: COD
name: Center for Orbit Determination in Europe (AIUB)
website: http://www.aiub.unibe.ch/

servers:
  - id: code_ftp
    name: Primary FTP
    hostname: "ftp://ftp.aiub.unibe.ch"
    protocol: ftp
    auth_required: false
    description: CODE FTP server at University of Bern

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: code_orbit
    product_name: ORBIT
    server_id: code_ftp
    available: true
    description: CODE precise orbits
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: 05M}
      - {name: SMP, value: 15M}
    directory: {pattern: "CODE/{YYYY}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: code_clock
    product_name: CLOCK
    server_id: code_ftp
    available: true
    description: CODE precise clocks
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 30S}
      - {name: SMP, value: 05M}
    directory: {pattern: "CODE/{YYYY}/"}

  # ── ERP ─────────────────────────────────────────────────────────
  - id: code_erp
    product_name: ERP
    server_id: code_ftp
    available: true
    description: Earth rotation parameters
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "CODE/{YYYY}/"}

  # ── Biases ──────────────────────────────────────────────────────
  - id: code_bias
    product_name: BIA
    server_id: code_ftp
    available: true
    description: Differential code biases (DCB/OSB)
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "CODE/{YYYY}/"}

  # ── Ionosphere ─────────────────────────────────────────────────
  - id: code_gim
    product_name: IONEX
    server_id: code_ftp
    available: true
    description: Global Ionosphere Maps (CODE is primary producer)
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: TTT, value: PRD}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 01H}
      - {name: SMP, value: 02H}
    directory: {pattern: "CODE/{YYYY}/"}

  # ── SINEX weekly solutions ──────────────────────────────────────
  - id: code_sinex
    product_name: SINEX
    server_id: code_ftp
    available: true
    description: CODE weekly station coordinate SINEX solutions
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
    directory: {pattern: "CODE/{YYYY}/"}

  # ── Troposphere SINEX ──────────────────────────────────────────
  - id: code_trop
    product_name: TROP
    server_id: code_ftp
    available: true
    description: CODE troposphere SINEX (zenith total delay + horizontal gradients)
    parameters:
      - {name: AAA, value: COD}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 05M}
    directory: {pattern: "CODE/{YYYY}/"}

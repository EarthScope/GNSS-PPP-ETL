id: ESA
name: ESA/ESOC
description: >
  European Space Agency's European Space Operations center in Darmstadt.
  Produces GPS products and is primary producer for Galileo.
website: https://www.esa.int/

servers:
  - id: esa_ftp
    name: ESA GNSS FTP
    hostname: "ftp://gssc.esa.int"
    protocol: ftp
    auth_required: false
    description: ESA GNSS Science Support center

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: esa_orbit
    product_name: ORBIT
    server_id: esa_ftp
    available: true
    description: Precise orbits
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: PPP, value: MGX}
      - {name: SMP, value: "05M"}
      - {name: SMP, value: "15M"}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: esa_clock
    product_name: CLOCK
    server_id: esa_ftp
    available: true
    description: Precise clocks
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: "30S"}
      - {name: SMP, value: "05M"}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── ERP ─────────────────────────────────────────────────────────
  - id: esa_erp
    product_name: ERP
    server_id: esa_ftp
    available: true
    description: Earth rotation parameters
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Biases ──────────────────────────────────────────────────────
  - id: esa_bia
    product_name: BIA
    server_id: esa_ftp
    available: true
    description: DCB-style bias files (ESA uses CNT=BIA rather than CNT=OSB)
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: CNT, value: BIA}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

  # ── Ionosphere (GIM) ───────────────────────────────────────────
  - id: esa_gim
    product_name: IONEX
    server_id: esa_ftp
    available: true
    description: ESA Global Ionosphere Maps
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: "01H"}
      - {name: SMP, value: "02H"}
    directory: {pattern: "gnss/products/ionex/{YYYY}/{DDD}/"}

  # ── SINEX weekly solutions ──────────────────────────────────────
  - id: esa_sinex
    product_name: SINEX
    server_id: esa_ftp
    available: true
    description: ESA/ESOC weekly station coordinate SINEX solutions
    parameters:
      - {name: AAA, value: ESA}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
    directory: {pattern: "gnss/products/{GPSWEEK}/"}

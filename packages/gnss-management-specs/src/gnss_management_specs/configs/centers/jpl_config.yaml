id: JPL
name: NASA Jet Propulsion Laboratory
description: >
  JPL is one of the founding IGS analysis centers and the primary contributor
  of ionosphere VTEC maps (jplg). Produces GPS/GNSS precise orbits, clocks,
  and the widely-used JPL IONEX product series.
website: https://www.jpl.nasa.gov/

servers:
  - id: jpl_sideshow
    name: JPL Sideshow HTTPS
    hostname: "https://sideshow.jpl.nasa.gov"
    protocol: https
    auth_required: false
    description: >
      JPL public HTTPS server. FTP access was discontinued in 2019.
      IGS long-filename products are in pub/jpligsac/{GPSWEEK}/.

products:
  # ── Orbits ──────────────────────────────────────────────────────
  - id: jpl_orbit
    product_name: ORBIT
    server_id: jpl_sideshow
    available: true
    description: JPL precise GPS/GNSS orbits
    parameters:
      - {name: AAA, value: JPL}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 05M}
      - {name: SMP, value: 15M}
    directory: {pattern: "pub/jpligsac/{GPSWEEK}/"}

  # ── Clocks ──────────────────────────────────────────────────────
  - id: jpl_clock
    product_name: CLOCK
    server_id: jpl_sideshow
    available: true
    description: JPL precise satellite clocks
    parameters:
      - {name: AAA, value: JPL}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 30S}
      - {name: SMP, value: 05M}
    directory: {pattern: "pub/jpligsac/{GPSWEEK}/"}

  # ── ERP ─────────────────────────────────────────────────────────
  - id: jpl_erp
    product_name: ERP
    server_id: jpl_sideshow
    available: true
    description: Earth rotation parameters
    parameters:
      - {name: AAA, value: JPL}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "pub/jpligsac/{GPSWEEK}/"}

  # ── Biases ──────────────────────────────────────────────────────
  - id: jpl_bias
    product_name: BIA
    server_id: jpl_sideshow
    available: true
    description: Observable-specific signal biases (OSB)
    parameters:
      - {name: AAA, value: JPL}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
    directory: {pattern: "pub/jpligsac/{GPSWEEK}/"}

  # ── Ionosphere (GIM) ───────────────────────────────────────────
  # JPL is one of the primary IGS IONEX producers (jplg series).
  # The combined IGS GIM weights JPL products heavily.
  - id: jpl_gim
    product_name: IONEX
    server_id: jpl_sideshow
    available: true
    description: >
      JPL Global Ionosphere Maps — jplg VTEC series. One of the primary
      inputs to the IGS combined GIM (IGSG).
    parameters:
      - {name: AAA, value: JPL}
      - {name: TTT, value: FIN}
      - {name: TTT, value: RAP}
      - {name: PPP, value: OPS}
      - {name: SMP, value: 01H}
      - {name: SMP, value: 02H}
    directory: {pattern: "pub/jpligsac/{GPSWEEK}/"}

  # ── SINEX weekly solutions ──────────────────────────────────────
  - id: jpl_sinex
    product_name: SINEX
    server_id: jpl_sideshow
    available: true
    description: JPL weekly station coordinate SINEX solutions
    parameters:
      - {name: AAA, value: JPL}
      - {name: TTT, value: FIN}
      - {name: PPP, value: OPS}
    directory: {pattern: "pub/jpligsac/{GPSWEEK}/"}

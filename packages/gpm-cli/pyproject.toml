[project]
name = "gpm-cli"
version = "0.1.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "gnss-product-management>=0.1.0",
    "typer>=0.12",
    "rich>=13.0",
]

[project.scripts]
gnssommelier = "gpm_cli.app:main"

[tool.uv.sources]
gnss-product-management = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gpm_cli"]

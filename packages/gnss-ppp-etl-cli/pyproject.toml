[project]
name = "gnss-ppp-etl-cli"
version = "0.1.0"
requires-python = ">=3.10,<3.15"
dependencies = [
    "gnss-ppp-etl>=0.1.0",
    "typer>=0.12",
    "rich>=13.0",
]

[project.scripts]
gnss = "gnss_ppp_etl_cli.app:main"

[tool.uv.sources]
gnss-ppp-etl = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gnss_ppp_etl_cli"]

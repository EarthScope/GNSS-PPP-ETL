# PRIDE-PPPAR — FINAL-only Dependency Specification
# ==================================================
#
# Same products as pride_pppar.yaml but constrains timeliness
# to FINAL solutions only.  Use when reprocessing historic data
# where you require the highest-quality products.

name: pride-pppar-final
description: >
  PRIDE-PPPAR kinematic PPP-AR processing — FINAL products only.
  Identical dependencies to pride-pppar, but the TTT preference
  list is restricted to FIN so only final solutions are considered.
package: PRIDE
task: PPP

preferences:
  - parameter: AAA
    sorting: [WUM, COD, GFZ, ESA]
    description: >
      Prefer Wuhan, then CODE, GFZ, ESA analysis centres.

  - parameter: TTT
    sorting: [FIN]
    description: >
      Only accept final solutions.

dependencies:
  - spec: ORBIT
    constraints:
      TTT: FIN
    required: true
    description: Precise satellite orbits (SP3)

  - spec: CLOCK
    constraints:
      TTT: FIN
    required: true
    description: Precise satellite clocks (CLK)

  - spec: ERP
    constraints:
      TTT: FIN
    required: true
    description: Earth rotation parameters

  - spec: BIA
    constraints:
      TTT: FIN
    required: true
    description: Observable-specific signal biases

  - spec: ATTOBX
    constraints:
      TTT: FIN
    required: true
    description: Satellite attitude quaternions (OBX)

  - spec: ATTATX
    required: true
    description: Antenna phase center corrections (ANTEX)

  - spec: RNX3_BRDC
    required: true
    description: Broadcast navigation RINEX 3

  - spec: LEAP_SEC
    required: true
    description: Leap second table

  - spec: SAT_PARAMS
    required: true
    description: Satellite metadata parameters table

  # ---------------------------------------------------------------------------
  # Static tables from PRIDE-PPPAR installation
  # ---------------------------------------------------------------------------
  - spec: FILE_NAME_TABLE
    required: true
    description: Satellite name/identifier lookup table

  - spec: OCEAN_TIDE_FES2004
    required: true
    description: FES2004 ocean tide model coefficients

  - spec: OCEAN_LOAD_GREEN
    required: true
    description: Green's function coefficients for ocean tidal loading

  - spec: GPT3_GRID
    required: true
    description: GPT3 global pressure and temperature model grid

  - spec: OCEAN_LOAD_PROGRAM
    required: true
    description: Pre-computed ocean loading parameters

  - spec: OROGRAPHY_1X1
    required: true
    description: Ellipsoidal terrain height grid (1x1)

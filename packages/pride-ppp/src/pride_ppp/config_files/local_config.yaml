# PRIDE-PPP Local Storage Configuration
# ======================================
#
# Defines the local directory structure used by PRIDE-PPP for storing
# downloaded GNSS products. This mirrors the PRIDE convention:
#
#   <pride_dir>/
#   ├── <year>/
#   │   ├── product/common/     ← orbit, clock, bias, ERP, OBX
#   │   └── <doy>/
#   │       └── leo/            ← LEO satellite products
#   ├── rinex/
#   │   └── <year>/<doy>/       ← broadcast navigation RINEX
#   └── static/
#       ├── atx/                ← ANTEX antenna calibrations
#       ├── atmosphere/         ← orography grids
#       └── tables/             ← leap seconds, satellite parameters
#
# The `pride_dir` root is provided at runtime (typically from the
# RINEX processing date or an explicit argument).

layout: pride

# Directory templates relative to pride_dir
# Placeholders: {year}, {doy}
directories:
  common_products: "{year}/product/common"
  navigation: "rinex/{year}/{doy}"
  leo: "{year}/{doy}/leo"
  static_atx: "static/atx"
  static_tables: "static/tables"
  static_atmosphere: "static/atmosphere"

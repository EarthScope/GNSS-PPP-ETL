[project]
name = "pride-ppp"
dynamic = ["version"]
requires-python = ">=3.10,<3.15"
dependencies = [
    "gpm-specs",
    "gnss-product-management",
    "julian>=0.14",
    "pandas>=2.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
plot = ["matplotlib>=3.0"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
raw-options = { root = "../.." }

[tool.uv.sources]
gpm-specs = { workspace = true }
gnss-product-management = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v -s"
log_cli = true
log_cli_level = "INFO"
markers = [
    "integration: marks tests that require a running pdp3 binary",
]

# Analysis Center Configuration Schema
# =====================================
#
# This file documents the YAML schema for center configuration files.
# Each center file follows this structure.

# ------------------------------------------------------------------------------
# Schema Definition
# ------------------------------------------------------------------------------

# center:
#   code: str              # 3-letter code (WUM, COD, IGS, etc.)
#   name: str              # Full name
#   description: str       # Brief description
#
# servers:
#   - id: str              # Server identifier (e.g., "wuhan_ftp", "igs_http")
#     name: str            # Human-readable name
#     hostname: str        # Server hostname or URL
#     protocol: str        # ftp | ftps | http | https
#     auth_required: bool  # Whether authentication is needed
#     notes: str           # Special requirements (e.g., "Requires FTPS/TLS")
#
# products:
#   - id: str              # Unique product identifier (e.g., "wuhan_sp3_mgx")
#     format: str          # Product format: SP3, CLK, ERP, BIA, OBX, GIM, ATX, etc.
#     content: str         # Content type: ORB, CLK, ERP, OSB, ATT, GIM, etc.
#     server_id: str       # Reference to server.id
#     available: bool      # Whether this product is available
#     description: str     # Human-readable description
#     quality_set:         # List of available quality levels
#       - quality: FIN     # Final
#       - quality: RAP     # Rapid
#       - quality: ULT     # Ultra-rapid
#     campaign_set:        # Solution types offered
#       - campaign: str    # OPS, MGX, DEM, refframe_2022, etc.
#         center: str      # Center code (WUM, COD, igs20, etc.)
#         description: str # Optional description
#         valid_from: str  # Optional: ISO date when solution became valid
#         valid_to: str    # Optional: ISO date when solution expired
#     sampling_set:        # Available sampling intervals
#       - interval: "05M" # 5 minutes
#       - interval: "30S" # 30 seconds
#     duration_set:        # Data coverage durations
#       - duration: "01D" # 1 day
#     version: str         # Version (usually "0")
#     directory: str       # Remote directory path with placeholders
#     filename: str        # Filename template for exact match

# rinex:
#   - id: str              # Unique RINEX product identifier
#     content: str          # RINEX content type: N, G, P, MN, etc.
#     server_id: str        # Reference to server.id
#     available: bool       # Whether this product is available
#     description: str      # Human-readable description
#     station_set:          # List of stations
#       - station: str      # Station code (BRDC, etc.)
#         description: str  # Optional description
#     monument_set:         # List of monuments
#       - monument: str     # Monument code
#         description: str  # Optional description
#     receiver_set:         # List of receivers
#       - receiver: str     # Receiver code
#         description: str  # Optional description
#     region_set:           # List of regions
#       - region: str       # Region code
#         description: str  # Optional description
#     directory: str        # Remote directory path with placeholders
#     filename: str         # Filename template for exact match

# ------------------------------------------------------------------------------
# File Structure Examples
# ------------------------------------------------------------------------------
#
# Standard date-based products (SP3, CLK, etc.):
#   files:
#     - id: "default"
#       timeindices: [YEAR, DOY, GPS_WEEK]
#       directory: pub/whu/phasebias/{year}/orbit/
#       filename:
#         template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_ORB.SP3.gz"
#         regex: "WUM.*{year}{doy}.*ORB.*SP3"
#
# Products with current + archive locations (ATX):
#   files:
#     - id: "current"
#       timeindices: [YEAR, DOY, GPS_WEEK]
#       directory: pub/station/general/
#       filename:
#         template: "{solution_prefix}.atx"
#         regex: "igs.*\\.atx"
#     - id: "archive"
#       timeindices: [YEAR, DOY, GPS_WEEK]
#       directory: pub/station/general/pcv_archive/
#       filename:
#         template: "{solution_prefix}_{gps_week}.atx"
#         regex: "igs.*\\.atx"
#
# Products with date-based variants (CODE MGEX ATX):
#   files:
#     - id: "m20"
#       timeindices: []
#       directory: CODE_MGEX/CODE/
#       filename:
#         template: "M20.ATX"
#         regex: "M20\\.ATX"
#       valid_from: "2021-05-02"
#     - id: "m14"
#       timeindices: []
#       directory: CODE_MGEX/CODE/
#       filename:
#         template: "M14.ATX"
#         regex: "M14\\.ATX"
#       valid_to: "2021-05-01"

# ------------------------------------------------------------------------------
# Placeholder Reference
# ------------------------------------------------------------------------------
#
# Date placeholders:
#   {year}      - 4-digit year (2025)
#   {yy}        - 2-digit year (25)
#   {doy}       - 3-digit day of year (001-366)
#   {month}     - 2-digit month (01-12)
#   {day}       - 2-digit day (01-31)
#   {gps_week}  - GPS week number (2345)
#   {dow}       - Day of week (0=Sunday, 6=Saturday)
#
# Product placeholders:
#   {solution_prefix} - Solution prefix from solutions[].prefix (WUM, igs20, etc.)
#   {solution_code}   - Solution code from solutions[].code (OPS, MGX, etc.)
#   {version}   - Version (usually 0)
#   {qual}      - Quality level (FIN, RAP, ULT)
#   {interval}  - Sampling interval (05M, 30S, etc.)
#   {coverage}  - Data coverage (01D, 01H, etc.)
#   {content}   - Content type (ORB, CLK, ERP, etc.)
#   {ext}       - File extension (SP3, CLK, etc.)

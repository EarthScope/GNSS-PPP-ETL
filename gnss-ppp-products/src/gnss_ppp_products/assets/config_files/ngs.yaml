# NOAA National Geodetic Survey (NGS)
# ====================================
#
# Primary source for US antenna calibrations and geodetic products.


code: NGS
name: NOAA NGS
description: >
  NOAA's National Geodetic Survey provides official US antenna calibrations,
  CORS network data, and geodetic reference products.
website: https://www.ngs.noaa.gov/

servers:
  - id: ngs_https
    name: NGS HTTPS
    hostname: https://www.ngs.noaa.gov
    protocol: https
    auth_required: false
    notes: Primary NGS web server

defaults:
  compressed: false

products: []

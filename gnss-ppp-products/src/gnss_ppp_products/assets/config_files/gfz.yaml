# GFZ Potsdam
# ===========
#
# GeoForschungsZentrum Potsdam, Germany.
# Primary center for GRACE/GRACE-FO data and MGEX products.


code: GFZ
name: GFZ Potsdam
description: >
  German Research Centre for Geosciences in Potsdam. Major IGS analysis
  center and primary distributor of GRACE/GRACE-FO mission data.
  Produces GPS (GFZ) and MGEX (GBM) products.
website: https://www.gfz-potsdam.de/

servers:
  - id: gfz_ftp
    name: ISDC FTP
    hostname: ftp://isdcftp.gfz-potsdam.de
    protocol: ftp
    auth_required: false
    notes: Information System and Data Center (ISDC) FTP

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: gfz_sp3
    format: SP3
    content: ORB
    server_id: gfz_ftp
    available: true
    description: Precise orbits
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: GFZ
        description: GPS-only operational
      - campaign: MGX
        center: GBM
        description: MGEX multi-GNSS
    sampling_set:
      - interval: "05M"
      - interval: "15M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/final/w{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ORB.SP3.*"

  - id: gfz_clk
    format: CLK
    content: CLK
    server_id: gfz_ftp
    available: true
    description: Precise clocks
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: GFZ
      - campaign: MGX
        center: GBM
    sampling_set:
      - interval: "30S"
      - interval: "05M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/final/w{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_CLK.CLK.*"


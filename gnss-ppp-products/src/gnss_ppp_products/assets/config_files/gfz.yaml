# GFZ Potsdam
# ===========
#
# GeoForschungsZentrum Potsdam, Germany.
# Primary center for GRACE/GRACE-FO data and MGEX products.


code: GFZ
name: GFZ Potsdam
description: >
  German Research Centre for Geosciences in Potsdam. Major IGS analysis
  center and primary distributor of GRACE/GRACE-FO mission data.
  Produces GPS (GFZ) and MGEX (GBM) products.
website: https://www.gfz-potsdam.de/

servers:
  - id: gfz_ftp
    name: ISDC FTP
    hostname: ftp://isdcftp.gfz-potsdam.de
    protocol: ftp
    auth_required: false
    notes: Information System and Data Center (ISDC) FTP

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: gfz_sp3
    format: SP3
    content: ORB
    server_id: gfz_ftp
    available: true
    description: Precise orbits
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: GFZ
        description: GPS-only operational
      - campaign: MGX
        center: GBM
        description: MGEX multi-GNSS
    sampling_set:
      - interval: "05M"
      - interval: "15M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/final/w{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ORB.SP3.*"

  - id: gfz_clk
    format: CLK
    content: CLK
    server_id: gfz_ftp
    available: true
    description: Precise clocks
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: GFZ
      - campaign: MGX
        center: GBM
    sampling_set:
      - interval: "30S"
      - interval: "05M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: gnss/products/final/w{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_CLK.CLK.*"

leo:
  - id: gfz_grace_fo
    server_id: gfz_ftp
    available: true
    description: GRACE-FO Level-1B instrument data
    mission_set:
      - mission: grace-fo
        description: GRACE Follow-On (2018+)
    instrument_set:
      - instrument: GNV
        description: GPS Navigation
      - instrument: ACC
        description: Accelerometer
      - instrument: SCA
        description: Star Camera Assembly
      - instrument: KBR
        description: K-Band Ranging
      - instrument: LRI
        description: Laser Ranging Interferometer
    directory: "{mission}/Level-1B/JPL/{instrument}/RL04/{year}/"
    filename: "{instrument}_{year}-{month}-{day}_{spacecraft}_\\d+\\..*"

  - id: gfz_grace
    server_id: gfz_ftp
    available: true
    description: GRACE (original) Level-1B instrument data
    mission_set:
      - mission: grace
        description: Original GRACE (2002-2017)
    instrument_set:
      - instrument: GNV
        description: GPS Navigation
      - instrument: ACC
        description: Accelerometer
      - instrument: SCA
        description: Star Camera Assembly
      - instrument: KBR
        description: K-Band Ranging
    directory: "{mission}/Level-1B/JPL/{instrument}/RL02/{year}/"
    filename: "{instrument}_{year}-{month}-{day}_{spacecraft}_\\d+\\..*"

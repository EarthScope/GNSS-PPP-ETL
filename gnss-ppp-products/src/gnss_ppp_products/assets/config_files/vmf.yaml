# Vienna Mapping Functions (TU Wien)
# ===================================
#
# Troposphere products from TU Wien (Vienna University of Technology).
# Primary source for VMF1/VMF3 tropospheric mapping functions and delays.


code: VMF
name: TU Wien (Vienna)
description: >
  Vienna University of Technology provides Vienna Mapping Functions
  (VMF) for tropospheric delay modeling. VMF products include hydrostatic
  and wet mapping coefficients and zenith delay values.
website: https://vmf.geo.tuwien.ac.at/

servers:
  - id: vmf_https
    name: VMF HTTPS
    hostname: https://vmf.geo.tuwien.ac.at
    protocol: https
    auth_required: false
    notes: Primary HTTP server for VMF products

defaults:
  compressed: false  # VMF files are typically uncompressed

products: []

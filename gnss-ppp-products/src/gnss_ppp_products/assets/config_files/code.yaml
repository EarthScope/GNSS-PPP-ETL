# CODE Analysis Center (AIUB, Bern)
# ==================================
#
# Center for Orbit Determination in Europe at the Astronomical 
# Institute of the University of Bern. Known for high-quality
# GPS-only and MGEX products.


code: COD
name: CODE (AIUB)
description: >
  Center for Orbit Determination in Europe at the Astronomical Institute
  of the University of Bern. Provides high-precision GPS products and
  ionosphere models. Primary source for CODE GIM products.
website: http://www.aiub.unibe.ch/

servers:
  - id: code_ftp
    name: Primary FTP
    hostname: ftp://ftp.aiub.unibe.ch
    protocol: ftp
    auth_required: false
    notes: Primary AIUB FTP server

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: code_sp3
    format: SP3
    content: ORB
    server_id: code_ftp
    available: true
    description: Precise satellite orbits
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: COD
        description: GPS-only operational
      - campaign: MGX
        center: COD
        description: CODE MGEX
    sampling_set:
      - interval: "05M"
      - interval: "15M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: CODE/{year}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ORB.SP3.*"

  - id: code_clk
    format: CLK
    content: CLK
    server_id: code_ftp
    available: true
    description: Precise clocks
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: COD
    sampling_set:
      - interval: "30S"
      - interval: "05M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: CODE/{year}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_CLK.CLK.*"

  - id: code_erp
    format: ERP
    content: ERP
    server_id: code_ftp
    available: true
    description: Earth rotation parameters
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: COD
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: CODE/{year}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_01D_ERP.ERP.*"

  - id: code_bias
    format: BIA
    content: OSB
    server_id: code_ftp
    available: true
    description: Differential code biases (DCB/OSB)
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS

        center: COD
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: CODE/{year}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_01D_OSB.BIA.*"

  - id: code_gim
    format: INX
    content: GIM
    server_id: code_ftp
    available: true
    description: Global Ionosphere Maps (CODE is primary producer)
    quality_set:
      - quality: FIN
      - quality: RAP
      - quality: PRD
    campaign_set:
      - campaign: OPS
        center: COD
    sampling_set:
      - interval: "01H"
      - interval: "02H"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: CODE/{year}/
    filename: "COD0OPS{quality}_{year}{doy}0000_01D_01H_GIM.INX.*"

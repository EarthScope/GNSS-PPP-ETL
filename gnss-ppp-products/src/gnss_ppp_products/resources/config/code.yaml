# CODE Analysis Center (AIUB, Bern)
# ==================================
#
# Center for Orbit Determination in Europe at the Astronomical 
# Institute of the University of Bern. Known for high-quality
# GPS-only and MGEX products.


code: COD
name: CODE (AIUB)
description: >
  Center for Orbit Determination in Europe at the Astronomical Institute
  of the University of Bern. Provides high-precision GPS products and
  ionosphere models. Primary source for CODE GIM products.
website: http://www.aiub.unibe.ch/

servers:
  - id: code_ftp
    name: Primary FTP
    hostname: ftp://ftp.aiub.unibe.ch
    protocol: ftp
    auth_required: false
    notes: Primary AIUB FTP server

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: code_sp3
    type: SP3
    server_id: code_ftp
    available: true
    description: Precise satellite orbits
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: COD
        description: GPS-only operational
      - code: MGX
        prefix: COD
        description: CODE MGEX
    files:
      - id: default
        timeindices: [YEAR, DOY, GPS_WEEK]
        directory: CODE/{year}/
        filename:
          template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_ORB.SP3.gz"
          regex: "COD.*{qual}.*{year}{doy}.*SP3"
    intervals: ["05M", "15M"]
    extensions: [".SP3.gz", ".sp3.gz"]

  - id: code_clk
    type: CLK
    server_id: code_ftp
    available: true
    description: Precise clocks
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: COD
    files:
      - id: default
        timeindices: [YEAR, DOY]
        directory: CODE/{year}/
        filename:
          template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_CLK.CLK.gz"
          regex: "COD.*{qual}.*{year}{doy}.*CLK"
    intervals: ["30S", "05M"]
    extensions: [".CLK.gz", ".clk.gz"]

  - id: code_erp
    type: ERP
    server_id: code_ftp
    available: true
    description: Earth rotation parameters
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: COD
    files:
      - id: default
        timeindices: [YEAR, DOY]
        directory: CODE/{year}/
        filename:
          template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_01D_ERP.ERP.gz"
          regex: "COD.*{qual}.*{year}{doy}.*ERP"
    intervals: ["30S"]
    extensions: [".ERP.gz", ".erp.gz"]

  - id: code_bias
    type: BIAS
    server_id: code_ftp
    available: true
    description: Differential code biases (DCB/OSB)
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: COD
    files:
      - id: longform
        timeindices: [YEAR, DOY]
        directory: CODE/{year}/
        filename:
          template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_01D_OSB.BIA.gz"
          regex: "COD.*{qual}.*{year}{doy}.*BIA"
      - id: legacy
        timeindices: [YEAR, MONTH]
        directory: CODE/{year}/
        filename:
          template: "P1C1{yy}{month}.DCB.Z"
          regex: "P1C1{yy}.*DCB"
    intervals: ["30S"]
    extensions: [".BIA.gz", ".DCB.Z", ".BSX.gz"]

  - id: code_gim
    type: GIM
    server_id: code_ftp
    available: true
    description: Global Ionosphere Maps (CODE is primary producer)
    qualities: [FIN, RAP, PRD]
    solutions:
      - code: OPS
        prefix: COD
    files:
      - id: longform
        timeindices: [YEAR, DOY]
        directory: CODE/{year}/
        filename:
          template: "COD0OPS{qual}_{year}{doy}0000_01D_01H_GIM.INX.gz"
          regex: "COD.*{qual}.*{year}{doy}.*GIM"
        valid_from: "2022-01-01"
      - id: legacy
        timeindices: [YEAR, DOY]
        directory: CODE/{year}/
        filename:
          template: "CODG{doy}0.{yy}I.Z"
          regex: "CODG{doy}.*\\.{yy}I"
        valid_to: "2021-12-31"
    intervals: ["01H", "02H"]
    extensions: [".INX.gz", ".I.Z", ".ionex.gz"]
    notes: >
      CODE produces the most widely-used GIM products. Long-form naming
      started in 2022; legacy CODG format for older data.

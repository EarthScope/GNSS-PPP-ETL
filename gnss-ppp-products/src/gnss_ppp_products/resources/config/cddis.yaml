# NASA CDDIS Archive
# ==================
#
# Crustal Dynamics Data Information System at NASA Goddard.
# Major archive for IGS products. Requires FTPS (TLS) for all connections.


code: CDDIS
name: NASA CDDIS
description: >
  NASA's Crustal Dynamics Data Information System archives and 
  distributes space geodesy data including GNSS, SLR, VLBI, and DORIS.
  Mirrors products from all IGS analysis centers.
website: https://cddis.nasa.gov/

servers:
  - id: cddis_ftps
    name: CDDIS FTPS
    hostname: ftp://gdc.cddis.eosdis.nasa.gov
    protocol: ftps
    auth_required: false
    notes: >
      Requires FTPS (explicit TLS). Anonymous login with email address.
      May require NASA Earthdata login for some products.

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: cddis_sp3
    type: SP3
    server_id: cddis_ftps
    available: true
    description: Precise orbits (mirrors from all ACs)
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: IGS
      - code: MGX
        prefix: GBM
      - code: MGX
        prefix: WUM
      - code: OPS
        prefix: COD
    files:
      - id: default
        timeindices: [YEAR, DOY, GPS_WEEK]
        directory: gnss/products/{gps_week}/
        filename:
          template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_ORB.SP3.gz"
          regex: "{solution_prefix}.*{qual}.*{year}{doy}.*SP3"
    intervals: ["05M", "15M"]
    extensions: [".SP3.gz", ".sp3.gz"]

  - id: cddis_clk
    type: CLK
    server_id: cddis_ftps
    available: true
    description: Precise clocks (mirrors from all ACs)
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: IGS
      - code: MGX
        prefix: GBM
      - code: MGX
        prefix: WUM
    files:
      - id: default
        timeindices: [YEAR, DOY, GPS_WEEK]
        directory: gnss/products/{gps_week}/
        filename:
          template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_CLK.CLK.gz"
          regex: "{solution_prefix}.*{qual}.*{year}{doy}.*CLK"
    intervals: ["30S", "05M"]
    extensions: [".CLK.gz", ".clk.gz"]

  - id: cddis_gim
    type: GIM
    server_id: cddis_ftps
    available: true
    description: Global Ionosphere Maps
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: COD
      - code: OPS
        prefix: IGS
      - code: OPS
        prefix: JPL
      - code: OPS
        prefix: ESA
    files:
      - id: longform
        timeindices: [YEAR, DOY]
        directory: gnss/products/ionex/{year}/{doy}/
        filename:
          template: "{solution_prefix}0OPS{qual}_{year}{doy}0000_01D_{interval}_GIM.INX.gz"
          regex: "{solution_prefix}.*{qual}.*{year}{doy}.*GIM"
      - id: legacy
        timeindices: [YEAR, DOY]
        directory: gnss/products/ionex/{year}/{doy}/
        filename:
          template: "{solution_prefix}g{doy}0.{yy}i.Z"
          regex: "{solution_prefix}g{doy}.*\\.{yy}i"
    intervals: ["01H", "02H"]
    extensions: [".INX.gz", ".I.Z", ".ionex.gz"]

  - id: cddis_nav3
    type: RINEX3_NAV
    server_id: cddis_ftps
    available: true
    description: Broadcast navigation
    qualities: [FIN]
    solutions:
      - code: OPS
        prefix: BRD
    files:
      - id: default
        timeindices: [YEAR, DOY]
        directory: gnss/data/daily/{year}/{doy}/{yy}p/
        filename:
          template: "BRDC00IGS_R_{year}{doy}0000_01D_MN.rnx.gz"
          regex: "BRDC.*{year}{doy}.*rnx"
    extensions: [".rnx.gz"]

  - id: cddis_nav_gps
    type: RINEX2_NAV
    server_id: cddis_ftps
    available: true
    description: Legacy RINEX 2 GPS navigation
    qualities: [FIN]
    solutions:
      - code: OPS
        prefix: brdc
    files:
      - id: default
        timeindices: [YEAR, DOY]
        directory: gnss/data/daily/{year}/{doy}/{yy}n/
        filename:
          template: "brdc{doy}0.{yy}n.Z"
          regex: "brdc{doy}0\\.{yy}n"
    extensions: [".n.Z", ".g.Z", ".p.Z"]

  - id: cddis_nav_glonass
    type: RINEX2_NAV
    server_id: cddis_ftps
    available: true
    description: Legacy RINEX 2 GLONASS navigation
    qualities: [FIN]
    solutions:
      - code: OPS
        prefix: brdc
    files:
      - id: default
        timeindices: [YEAR, DOY]
        directory: gnss/data/daily/{year}/{doy}/{yy}n/
        filename:
          template: "brdc{doy}0.{yy}g.Z"
          regex: "brdc{doy}0\\.{yy}g"
    extensions: [".n.Z", ".g.Z", ".p.Z"]

  - id: cddis_nav_mixed
    type: RINEX2_NAV
    server_id: cddis_ftps
    available: true
    description: Legacy RINEX 2 mixed navigation
    qualities: [FIN]
    solutions:
      - code: OPS
        prefix: brdc
    files:
      - id: default
        timeindices: [YEAR, DOY]
        directory: gnss/data/daily/{year}/{doy}/{yy}n/
        filename:
          template: "brdc{doy}0.{yy}p.Z"
          regex: "brdc{doy}0\\.{yy}p"
    extensions: [".n.Z", ".g.Z", ".p.Z"]

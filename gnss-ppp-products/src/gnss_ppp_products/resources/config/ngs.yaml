# NOAA National Geodetic Survey (NGS)
# ====================================
#
# Primary source for US antenna calibrations and geodetic products.


code: NGS
name: NOAA NGS
description: >
  NOAA's National Geodetic Survey provides official US antenna calibrations,
  CORS network data, and geodetic reference products.
website: https://www.ngs.noaa.gov/

servers:
  - id: ngs_https
    name: NGS HTTPS
    hostname: https://www.ngs.noaa.gov
    protocol: https
    auth_required: false
    notes: Primary NGS web server

defaults:
  compressed: false

products:
  - id: ngs_atx
    type: ATX
    server_id: ngs_https
    available: true
    description: NGS ANTEX antenna calibrations
    qualities: [FIN]
    solutions:
      - code: OPS
        prefix: ngs
    directory:
      pattern: ANTCAL/LoadFile/
    filename:
      # NGS ANTEX files named by reference frame
      template: "ngs{frame}.atx"
      # Available frames: igs14, igs20, etc.
      regex: "ngs(08|14|20)\\.atx"
    frames: ["08", "14", "20"]
    extensions: [".atx"]
    static: true  # Frame-versioned, not date-specific
    notes: >
      NGS ANTEX includes additional US antenna calibrations not in IGS files.
      Useful for CORS and other US stations.

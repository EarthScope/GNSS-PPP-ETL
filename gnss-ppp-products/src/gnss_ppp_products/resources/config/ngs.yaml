# NOAA National Geodetic Survey (NGS)
# ====================================
#
# Primary source for US antenna calibrations and geodetic products.


code: NGS
name: NOAA NGS
description: >
  NOAA's National Geodetic Survey provides official US antenna calibrations,
  CORS network data, and geodetic reference products.
website: https://www.ngs.noaa.gov/

servers:
  - id: ngs_https
    name: NGS HTTPS
    hostname: https://www.ngs.noaa.gov
    protocol: https
    auth_required: false
    notes: Primary NGS web server

defaults:
  compressed: false

products:
  - id: ngs_atx
    type: ATX
    server_id: ngs_https
    available: true
    description: NGS ANTEX antenna calibrations
    qualities: [FIN]
    solutions:
      - code: refframe_2022
        prefix: ngs20
        description: NGS calibrations for IGS20 frame
      - code: refframe_2017
        prefix: ngs14
        description: NGS calibrations for IGS14 frame
      - code: refframe_2011
        prefix: ngs08
        description: NGS calibrations for IGS08 frame
    files:
      - id: current
        timeindices: []
        directory: ANTCAL/LoadFile/
        filename:
          template: "{solution_prefix}.atx"
          regex: "ngs(08|14|20)\\.atx"
    extensions: [".atx"]
    static: true  # Frame-versioned, not date-specific
    notes: >
      NGS ANTEX includes additional US antenna calibrations not in IGS files.
      Useful for CORS and other US stations.

# IGS Combined Solutions (via IGN France)
# ========================================
#
# International GNSS Service combined products, hosted by IGN France.
# Combined solutions are weighted combinations of multiple analysis centers.


code: IGS
name: IGS (via IGN France)
description: >
  International GNSS Service combined solutions hosted by Institut 
  National de l'Information Géographique et Forestière (IGN France).
  Combined products provide the official IGS reference solutions.
website: https://igs.org/

servers:
  - id: ign_ftp
    name: IGN France FTP
    hostname: ftp://igs.ign.fr
    protocol: ftp
    auth_required: false
    notes: IGN France FTP mirror
  - id: igs_http
    name: IGS HTTP
    hostname: https://files.igs.org
    protocol: https
    auth_required: false
    notes: IGS HTTP server for ANTEX and station data

defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: igs_nav
    directory: pub/igs/products/{gps_week}/
    content: MN
    server_id: ign_ftp
    available: true
    description: IGS merged broadcast navigation
    station_set:
      - station: BRDC
        description: Broadcast navigation (no station code)
    monument_set:
      - monument: 0
        description: No monument code for broadcast navigation
    receiver_set:
      - receiver: "0"
        description: No receiver code for broadcast navigation
    region_set: []
    directory: pub/igs/data/{year}/{doy}/
    filename: "BRDC00IGS_R_{year}{doy}0000_01D_MN.rnx.*"
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ORB.SP3.*"

  - id: igs_clk
    format: CLK
    content: CLK
    server_id: ign_ftp
    available: true
    description: IGS combined precise clocks
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
      - interval: "05M"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_CLK.CLK.*"

  - id: igs_erp
    format: ERP
    content: ERP
    server_id: ign_ftp
    available: true
    description: IGS combined Earth rotation parameters
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ERP.ERP.*"
    

  - id: igs_bias
    format: BIA
    content: OSB
    server_id: ign_ftp
    available: true
    description: IGS combined biases
    quality_set:
      - quality: FIN
      - quality: RAP
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_OSB.BIA.*"

  - id: igs_obx
    format: OBX
    content: ATT
    server_id: ign_ftp
    available: true
    description: IGS satellite attitude (ORBEX)
    quality_set:
      - quality: FIN
    campaign_set:
      - campaign: OPS
        center: IGS
    sampling_set:
      - interval: "30S"
    duration_set:
      - duration: "01D"
    version: "0"
    directory: pub/igs/products/{gps_week}/
    filename: "{center}{version}{campaign}{quality}_{year}{doy}0000_{duration}_{interval}_ATT.OBX.*"

  - id: igs_nav
    format: rnx
    content: MN
    server_id: ign_ftp
    available: true
    description: IGS merged broadcast navigation
    quality_set:
      - quality: FIN
    campaign_set:
      - campaign: OPS
        center: BRD
        description: IGS broadcast navigation
    sampling_set:
      - interval: "01D"
    duration_set:
      - duration: "01D"
    version: "C00"
    directory: pub/igs/data/{year}/{doy}/
    filename: "BRDC00IGS_R_{year}{doy}0000_01D_MN.rnx.*"

  - id: igs_atx
    type: ATX
    server_id: igs_http
    available: true
    description: IGS ANTEX antenna calibrations
    qualities: [FIN]
    solutions:
      - code: refframe_2022
        prefix: igs20
        description: IGS20 reference frame ANTEX
      - code: refframe_2017
        prefix: igs14
        description: IGS14 reference frame ANTEX
      - code: refframe_2011
        prefix: igs08
        description: IGS08 reference frame ANTEX
      - code: refframe_2006
        prefix: igs05
        description: IGS05 reference frame ANTEX


    files:
      - id: "igs_atx_current"
        timeindices: ["YEAR","DOY","GPS_WEEK"]
        directory: pub/station/general/
        filename:
          template: "{solution_prefix}.atx"
          regex: "{solution_prefix}\\.atx"
          
      - id: "igs_atx_archive"
        timeindices: ["YEAR","DOY","GPS_WEEK"]
        directory: pub/station/general/pcv_archive/
        filename:
          template: "{solution_prefix}_{gps_week}.atx"
          regex: "{solution_prefix}_{gps_week}\\.atx"

    notes: >
      ANTEX files are not date-specific but frame-specific (igs14, igs20).
      Archive contains weekly snapshots; current file is latest.

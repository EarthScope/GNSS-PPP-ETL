# Wuhan University GNSS Data Center
# ==================================
#
# Primary source for MGEX multi-GNSS products including:
# - WUM (Wuhan University MGEX)
# - WMC (Wuhan Multi-Constellation demonstration)


code: WUM
name: Wuhan University
description: >
  Wuhan University GNSS Research Center provides multi-GNSS precise 
  products through the IGS MGEX campaign. Known for rapid availability
  and comprehensive constellation support.
website: http://www.igs.gnsswhu.cn/

servers:
  - id: wuhan_ftp
    name: Primary FTP
    hostname: ftp://igs.gnsswhu.cn
    protocol: ftp
    auth_required: false
    notes: Primary FTP server, no authentication required

# Default filename pattern follows IGS long-form convention:
# {solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_{content}.{ext}.gz
defaults:
  version: "0"
  coverage: "01D"
  compressed: true

products:
  - id: wuhan_sp3
    type: SP3
    server_id: wuhan_ftp
    available: true
    description: Precise satellite orbits
    qualities: [FIN, RAP]
    solutions:
      - code: MGX
        prefix: WUM
        description: MGEX multi-GNSS operational
      - code: DEM  
        prefix: WMC
        description: Multi-constellation demonstration
    directory:
      pattern: pub/whu/phasebias/{year}/orbit/
    filename:
      template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_ORB.SP3.gz"
      regex: "{qual}.*{year}{doy}.*ORB.*SP3"
    intervals: ["05M", "15M"]
    extensions: [".SP3.gz", ".sp3.gz"]

  - id: wuhan_clk
    type: CLK
    server_id: wuhan_ftp
    available: true
    description: Precise satellite and station clocks
    qualities: [FIN, RAP]
    solutions:
      - code: MGX
        prefix: WUM
      - code: DEM
        prefix: WMC
    directory:
      pattern: pub/whu/phasebias/{year}/clock/
    filename:
      template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_CLK.CLK.gz"
      regex: "{qual}.*{year}{doy}.*CLK"
    intervals: ["30S", "05M"]
    extensions: [".CLK.gz", ".clk.gz"]

  - id: wuhan_erp
    type: ERP
    server_id: wuhan_ftp
    available: true
    description: Earth rotation parameters
    qualities: [FIN, RAP]
    solutions:
      - code: MGX
        prefix: WUM
    directory:
      pattern: pub/whu/phasebias/{year}/orbit/
    filename:
      template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_01D_ERP.ERP.gz"
      regex: "{qual}.*{year}{doy}.*ERP"
    intervals: ["01D"]
    extensions: [".ERP.gz", ".erp.gz"]

  - id: wuhan_bias
    type: BIAS
    server_id: wuhan_ftp
    available: true
    description: Observable-specific biases (OSB)
    qualities: [FIN, RAP]
    solutions:
      - code: MGX
        prefix: WUM
      - code: DEM
        prefix: WMC
    directory:
      pattern: pub/whu/phasebias/{year}/bias/
    filename:
      template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_01D_OSB.BIA.gz"
      regex: "{qual}.*{year}{doy}.*BIA"
    intervals: ["01D"]
    extensions: [".BIA.gz", ".bia.gz", ".BSX.gz"]

  - id: wuhan_obx
    type: OBX
    server_id: wuhan_ftp
    available: true
    description: Satellite attitude quaternions (ORBEX)
    qualities: [FIN]
    solutions:
      - code: DEM
        prefix: WMC
    directory:
      pattern: pub/whu/phasebias/{year}/orbit/
    filename:
      template: "{solution_prefix}{version}{solution_code}{qual}_{year}{doy}0000_{coverage}_{interval}_ATT.OBX.gz"
      regex: "{qual}.*{year}{doy}.*OBX"
    intervals: ["30S"]
    extensions: [".OBX.gz", ".obx.gz"]

  - id: wuhan_nav
    type: RINEX3_NAV
    server_id: wuhan_ftp
    available: true
    description: RINEX 3 broadcast navigation (multi-GNSS)
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: BRD
    directory:
      pattern: pub/gps/data/daily/{year}/{doy}/{yy}p
    filename:
      template: "BRDC00IGS_R_{year}{doy}0000_01D_MN.rnx.gz"
      regex: "BRDC.*{year}{doy}.*MN.*rnx"
    intervals: []
    extensions: [".rnx.gz"]

  - id: wuhan_gim
    type: GIM
    server_id: wuhan_ftp
    available: true
    description: Global Ionosphere Maps (mirrored from various centers)
    qualities: [FIN, RAP]
    solutions:
      - code: OPS
        prefix: COD
      - code: OPS
        prefix: IGS
      - code: OPS  
        prefix: JPL
    directory:
      pattern: pub/gps/products/ionex/{year}/{doy}/
    filename:
      template: "{solution_prefix}0OPS{qual}_{year}{doy}0000_01D_{interval}_GIM.INX.gz"
      regex: "{qual}.*{year}{doy}.*GIM.*INX"
    intervals: ["01H", "02H"]
    extensions: [".INX.gz", ".ionex.gz", ".I.Z"]

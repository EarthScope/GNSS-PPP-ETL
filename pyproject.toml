[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
gpm-specs = { workspace = true }
gnss-product-management = { workspace = true }
pride-ppp = { workspace = true }

[dependency-groups]
dev = [
    "geopandas>=1.1.3",
    "pre-commit>=4.5.1",
    "pre-commit-hooks>=4.6.0",
    "ruff>=0.15.8",
]
test = [
  "pytest>=8",
]
docs = [
    "sphinx>=7",
    "sphinx-rtd-theme>=2",
    "myst-parser>=3",
    "sphinx-autodoc-typehints>=2",
    "autodoc-pydantic>=2",
]

[tool.pytest.ini_options]
testpaths = [
    "packages/gnss-product-management/test",
    "packages/gpm-cli/test",
]
addopts = "-v"
markers = [
    "integration: tests that hit live servers (deselect with -m 'not integration')",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

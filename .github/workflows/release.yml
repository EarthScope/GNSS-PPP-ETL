name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group dev --group test
      - run: uv run ruff format --check packages/
      - run: uv run ruff check packages/
      - run: uv run pytest packages/gnss-product-management/test/ -m "not integration" -q
      - run: uv run pytest packages/gpm-cli/test/ -q

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - gpm-specs
          - gnss-product-management
          - gpm-cli
          - pride-ppp
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv build packages/${{ matrix.package }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # PyPI trusted publishing
    strategy:
      matrix:
        package:
          - gpm-specs
          - gnss-product-management
          - gpm-cli
          - pride-ppp
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
